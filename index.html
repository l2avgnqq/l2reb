<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXP L2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    margin:0;
    padding:20px;
    background:#0b1220;
    color:white;
    font-family:Arial;
}

.top{
    text-align:center;
    margin-bottom:20px;
}

.players{
    max-width:1000px;
    margin:auto;
}

.player{
    background:#162033;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;

    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.idx{
    width:30px;
    color:#94a3b8;
    font-weight:bold;
}

.name{
    width:150px;
    font-weight:bold;
}

.time{
    width:130px;
    font-size:22px;
    font-weight:bold;
    color:#22c55e;
}

.warn{
    background:#3a2d00;
}

.danger{
    background:#4a1010;
}

.actions{
    margin-left:auto;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

input{
    padding:8px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.add{
    background:#2563eb;
}

.pause{
    background:#f59e0b;
}

.resume{
    background:#22c55e;
}

.del{
    background:#ef4444;
}

.global{
    background:#334155;
}

</style>
</head>

<body>

<div class="top">

    <h2>EXP L2</h2>

    <input id="name" placeholder="Имя">
    <input id="minutes" type="number" placeholder="Минут">

    <button class="add" onclick="addPlayer()">
        Добавить
    </button>

    <br><br>

    <input id="allMinutes" type="number" placeholder="+ всем">

    <button class="add" onclick="addAll()">
        + всем
    </button>

    <br><br>

    <button class="global" onclick="pauseAll()">
        ⏸ Пауза всем
    </button>

    <button class="global" onclick="resumeAll()">
        ▶ Старт всем
    </button>

    <button class="global" onclick="clearAll()">
        🗑 Очистить
    </button>

</div>

<div id="list" class="players"></div>

<script>

/* =========================
   SUPABASE
========================= */

const SUPABASE_URL =
"https://mxwtlfkhykqegzytotlq.supabase.co";

const SUPABASE_KEY =
"sb_publishable_-FajhSo3HLdy00i5VNemSA_89bLw5Qp";

const db = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

/* =========================
   STATE
========================= */

let players = {};

/* =========================
   HELPERS
========================= */

function safeId(name){
    return name.replace(/[^a-zA-Z0-9_-]/g,"_");
}

function formatTime(sec){

    sec = Math.max(0, sec);

    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;

    return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function getRemaining(player){

    if(!player.running){
        return player.time;
    }

    if(!player.last_update){
        return player.time;
    }

    const diff = Math.floor(
        (Date.now() - new Date(player.last_update).getTime()) / 1000
    );

    return Math.max(0, player.time - diff);
}

/* =========================
   LOAD
========================= */

async function loadPlayers(){

    const { data, error } = await db
        .from("timers")
        .select("*");

    if(error){
        console.log(error);
        return;
    }

    players = {};

    (data || []).forEach(player=>{
        players[player.name] = player;
    });
}

/* =========================
   SAVE
========================= */

async function savePlayer(player){

    await db
        .from("timers")
        .upsert(player);
}

/* =========================
   CREATE ROW
========================= */

function createRow(player){

    const id = safeId(player.name);

    const div = document.createElement("div");

    div.className = "player";
    div.id = "row_" + id;

    div.innerHTML = `

        <div class="idx">0</div>

        <div class="name">
            ${player.name}
        </div>

        <div class="time" id="time_${id}">
            0
        </div>

        <div class="actions">

            <button id="btn_${id}">
                ...
            </button>

            <input
                id="input_${id}"
                type="number"
                placeholder="+мин"
            >

            <button
                class="add"
                onclick="addTime('${player.name}')"
            >
                +
            </button>

            <button
                class="del"
                onclick="deletePlayer('${player.name}')"
            >
                🗑
            </button>

        </div>

    `;

    document
        .getElementById("list")
        .appendChild(div);
}

/* =========================
   CLEANUP
========================= */

function cleanupRows(){

    document
        .querySelectorAll(".player")
        .forEach(row=>{

            const id = row.id.replace("row_","");

            const exists = Object
                .values(players)
                .some(player=>safeId(player.name) === id);

            if(!exists){
                row.remove();
            }

        });
}

/* =========================
   ENSURE ROWS
========================= */

function ensureRows(){

    Object.values(players).forEach(player=>{

        const id = safeId(player.name);

        if(!document.getElementById("row_" + id)){
            createRow(player);
        }

    });
}

/* =========================
   UPDATE UI
========================= */

function updateUI(){

    const sorted = Object
        .values(players)

        .map(player=>({
            ...player,
            remaining:getRemaining(player)
        }))

        .sort((a,b)=>a.remaining - b.remaining);

    const list = document.getElementById("list");

    sorted.forEach((player,index)=>{

        const id = safeId(player.name);

        const row = document.getElementById("row_" + id);

        if(!row) return;

        list.appendChild(row);

        row.querySelector(".idx").innerText = index + 1;

        const timeEl = document.getElementById("time_" + id);

        timeEl.innerText = formatTime(player.remaining);

        row.classList.remove("warn","danger");

        if(player.remaining <= 300){
            row.classList.add("warn");
        }

        if(player.remaining <= 60){
            row.classList.add("danger");
        }

        const btn = document.getElementById("btn_" + id);

        if(player.running){

            btn.innerText = "⏸";

            btn.className = "pause";

            btn.onclick = ()=>pausePlayer(player.name);

        }else{

            btn.innerText = "▶";

            btn.className = "resume";

            btn.onclick = ()=>resumePlayer(player.name);

        }

    });
}

/* =========================
   RENDER
========================= */

function render(){

    cleanupRows();

    ensureRows();

    updateUI();
}

/* =========================
   ADD PLAYER
========================= */

async function addPlayer(){

    const name = document
        .getElementById("name")
        .value
        .trim();

    const minutes = parseInt(
        document.getElementById("minutes").value
    );

    if(!name) return;

    if(isNaN(minutes) || minutes <= 0){
        return;
    }

    let player = players[name] || {
        name:name,
        time:0,
        running:false,
        last_update:null
    };

    player.time =
        getRemaining(player) + minutes * 60;

    player.running = true;

    player.last_update =
        new Date().toISOString();

    await savePlayer(player);

    document.getElementById("name").value = "";
    document.getElementById("minutes").value = "";

    await loadPlayers();

    render();
}

/* =========================
   ADD TIME
========================= */

async function addTime(name){

    const id = safeId(name);

    const minutes = parseInt(
        document.getElementById("input_" + id).value
    );

    if(isNaN(minutes) || minutes <= 0){
        return;
    }

    const player = players[name];

    player.time =
        getRemaining(player) + minutes * 60;

    player.running = true;

    player.last_update =
        new Date().toISOString();

    await savePlayer(player);

    document.getElementById("input_" + id).value = "";

    await loadPlayers();

    render();
}

/* =========================
   PAUSE
========================= */

async function pausePlayer(name){

    const player = players[name];

    player.time = getRemaining(player);

    player.running = false;

    player.last_update = null;

    await savePlayer(player);

    await loadPlayers();

    render();
}

/* =========================
   RESUME
========================= */

async function resumePlayer(name){

    const player = players[name];

    if(getRemaining(player) <= 0){
        return;
    }

    player.running = true;

    player.last_update =
        new Date().toISOString();

    await savePlayer(player);

    await loadPlayers();

    render();
}

/* =========================
   DELETE
========================= */

async function deletePlayer(name){

    await db
        .from("timers")
        .delete()
        .eq("name", name);

    delete players[name];

    render();
}

/* =========================
   ADD ALL
========================= */

async function addAll(){

    const minutes = parseInt(
        document.getElementById("allMinutes").value
    );

    if(isNaN(minutes) || minutes <= 0){
        return;
    }

    for(const player of Object.values(players)){

        player.time =
            getRemaining(player) + minutes * 60;

        player.running = true;

        player.last_update =
            new Date().toISOString();

        await savePlayer(player);
    }

    document.getElementById("allMinutes").value = "";

    await loadPlayers();

    render();
}

/* =========================
   PAUSE ALL
========================= */

async function pauseAll(){

    for(const player of Object.values(players)){

        player.time = getRemaining(player);

        player.running = false;

        player.last_update = null;

        await savePlayer(player);
    }

    await loadPlayers();

    render();
}

/* =========================
   RESUME ALL
========================= */

async function resumeAll(){

    for(const player of Object.values(players)){

        if(getRemaining(player) <= 0){
            continue;
        }

        player.running = true;

        player.last_update =
            new Date().toISOString();

        await savePlayer(player);
    }

    await loadPlayers();

    render();
}

/* =========================
   CLEAR ALL
========================= */

async function clearAll(){

    await db
        .from("timers")
        .delete()
        .neq("name","___");

    players = {};

    document.getElementById("list").innerHTML = "";
}

/* =========================
   REALTIME
========================= */

db.channel("timers-realtime")

.on(
    "postgres_changes",
    {
        event:"*",
        schema:"public",
        table:"timers"
    },

    async ()=>{

        await loadPlayers();

        render();

    }
)

.subscribe();

/* =========================
   INIT
========================= */

async function init(){

    await loadPlayers();

    render();

    setInterval(updateUI,1000);
}

init();

</script>

</body>
</html>
