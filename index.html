<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>EXP Lineage2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#1a1a2e; color:#fff; }
.top { text-align:center; }

input, button {
    padding:6px;
    margin:3px;
    border-radius:6px;
    border:none;
}

button { cursor:pointer; font-weight:bold; }

#addBtn { background:#e74c3c; color:white; }
#addAllBtn { background:#9b59b6; color:white; }
.global { background:#34495e; color:white; }

.players { padding:20px; max-width:700px; }

.player {
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px;
    border-bottom:1px solid rgba(255,255,255,0.2);
}

.warning { background:rgba(255,165,0,0.3); }
.danger { background:rgba(255,0,0,0.4); }
</style>
</head>

<body>

<div class="top">
    <h1>EXP Lineage2</h1>

    <input id="name" placeholder="Имя">
    <input id="minutes" type="number" placeholder="Минуты">
    <button id="addBtn">Добавить</button>

    <br>

    <input id="allMinutes" type="number" placeholder="+мин всем">
    <button id="addAllBtn">Добавить всем</button>

    <br>

    <button id="pauseAll" class="global">⏸ Пауза всем</button>
    <button id="resumeAll" class="global">▶ Старт всем</button>
    <button id="clearAll" class="global">🧹 Очистить всех</button>
</div>

<div id="players" class="players"></div>

<script>

const SUPABASE_URL = "https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY = "ВСТАВ СЮДА СВОЙ ANON KEY";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let data = {};

/* ---------- LOAD ---------- */
async function load(){
    const { data: rows, error } = await db
        .from("timers")
        .select("*");

    if(error){
        console.log("LOAD ERROR:", error);
        return;
    }

    data = {};

    (rows || []).forEach(p=>{
        data[p.name] = p;
    });
}

/* ---------- SAVE ---------- */
async function save(p){
    const { error } = await db
        .from("timers")
        .upsert(p, {
            onConflict: "name"
        });

    if(error){
        console.log("SAVE ERROR:", error);
    }
}

/* ---------- TIME ---------- */
function updateTime(p){
    if(!p.running) return;

    const last = new Date(p.last_update || Date.now());
    const diff = Math.floor((Date.now() - last) / 1000);

    if(diff <= 0) return;

    const worked = Math.min(diff, p.time || 0);

    p.time -= worked;
    p.last_update = new Date().toISOString();

    if(p.time <= 0){
        p.time = 0;
        p.running = false;
    }
}

/* ---------- FORMAT ---------- */
function format(s){
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ":" + sec.toString().padStart(2,"0");
}

/* ---------- RENDER ---------- */
function render(){

    const container = document.getElementById("players");
    container.innerHTML = "";

    Object.values(data).forEach(updateTime);

    const arr = Object.values(data).sort((a,b)=> a.time - b.time);

    arr.forEach((p, i)=>{

        const div = document.createElement("div");
        div.className = "player";

        if(p.time <= 300 && p.time > 60) div.classList.add("warning");
        if(p.time <= 60) div.classList.add("danger");

        div.innerHTML = `
            <span style="width:30px;">${i+1}.</span>
            <span style="width:120px;"><b>${p.name}</b></span>
            <span style="width:80px;">${format(p.time)}</span>

            <button onclick="pause('${p.name}')">⏸</button>
            <button onclick="resume('${p.name}')">▶</button>

            <input type="number" id="add_${p.name}" style="width:60px;">
            <button onclick="addTime('${p.name}')">+</button>

            <button onclick="delPlayer('${p.name}')">❌</button>
        `;

        container.appendChild(div);
    });
}

/* ---------- ACTIONS ---------- */

async function add(){

    const name = document.getElementById("name").value.trim();
    const min = parseInt(document.getElementById("minutes").value);

    if(!name || !min) return;

    let p = data[name] || {
        name,
        time: 0,
        running: false,
        last_update: new Date().toISOString()
    };

    updateTime(p);

    p.time += min * 60;
    p.running = true;
    p.last_update = new Date().toISOString();

    data[name] = p;

    await save(p);
    await load();
    render();
}

async function addTime(name){

    const val = parseInt(document.getElementById("add_"+name).value);
    if(!val) return;

    let p = data[name];

    updateTime(p);

    p.time += val * 60;
    p.running = true;
    p.last_update = new Date().toISOString();

    await save(p);
    await load();
    render();
}

async function pause(name){
    let p = data[name];
    updateTime(p);
    p.running = false;

    await save(p);
    render();
}

async function resume(name){
    let p = data[name];
    p.running = true;
    p.last_update = new Date().toISOString();

    await save(p);
    render();
}

async function delPlayer(name){
    await db.from("timers").delete().eq("name", name);
    delete data[name];
    render();
}

/* ---------- INIT ---------- */

document.getElementById("addBtn").onclick = add;
document.getElementById("addAllBtn").onclick = async () => {
    const min = parseInt(document.getElementById("allMinutes").value);
    if(!min) return;

    for(const name in data){
        let p = data[name];
        updateTime(p);
        p.time += min * 60;
        p.running = true;
        p.last_update = new Date().toISOString();
        await save(p);
    }

    await load();
    render();
};

document.getElementById("pauseAll").onclick = async () => {
    for(const name in data){
        let p = data[name];
        updateTime(p);
        p.running = false;
        await save(p);
    }
    render();
};

document.getElementById("resumeAll").onclick = async () => {
    for(const name in data){
        let p = data[name];
        p.running = true;
        p.last_update = new Date().toISOString();
        await save(p);
    }
    render();
};

document.getElementById("clearAll").onclick = async () => {
    await db.from("timers").delete().neq("name","");
    data = {};
    render();
};

async function init(){
    await load();
    render();
}

init();
setInterval(render, 1000);

</script>

</body>
</html>
