<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>L2 EXP Stable</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:#fff;
}

.top {
    text-align:center;
    padding:10px;
}

input, button {
    margin:3px;
    padding:6px;
}

.player {
    display:flex;
    gap:10px;
    padding:8px;
    border-bottom:1px solid #333;
}

.warning { background:#332200; }
.danger { background:#330000; }
</style>
</head>

<body>

<div class="top">
    <h2>EXP Lineage2</h2>

    <input id="name" placeholder="Name">
    <input id="minutes" type="number" placeholder="Min">
    <button onclick="add()">Add</button>

    <br>

    <input id="allMinutes" type="number" placeholder="+ all min">
    <button onclick="addAll()">Add all</button>

    <button onclick="pauseAll()">Pause</button>
    <button onclick="resumeAll()">Start</button>
    <button onclick="clearAll()">Clear</button>
</div>

<div id="players"></div>

<script>

const SUPABASE_URL = "https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let data = {};

/* ---------- LOAD ---------- */
async function load(){
    const { data:rows, error } = await db
        .from("timers")
        .select("*");

    if(error){
        console.log("LOAD ERROR:", error.message);
        return;
    }

    data = {};
    rows.forEach(r => {
        data[r.id] = r;
    });
}

/* ---------- SAVE (100% FIXED) ---------- */
async function save(p){
    if(!p.id){
        const { data:inserted, error } = await db
            .from("timers")
            .insert([p])
            .select()
            .single();

        if(error){
            console.log("INSERT ERROR:", error.message);
            return;
        }

        data[inserted.id] = inserted;
    } else {
        const { error } = await db
            .from("timers")
            .update(p)
            .eq("id", p.id);

        if(error){
            console.log("UPDATE ERROR:", error.message);
        }
    }
}

/* ---------- DELETE ---------- */
async function del(id){
    await db.from("timers").delete().eq("id", id);
    delete data[id];
}

/* ---------- TIME ---------- */
function updateTime(p){
    if(!p.running) return;

    let diff = Math.floor((Date.now() - new Date(p.last_update))/1000);

    let used = Math.min(diff, p.time);

    p.time -= used;
    p.last_update = new Date().toISOString();

    if(p.time <= 0){
        p.time = 0;
        p.running = false;
    }
}

/* ---------- FORMAT ---------- */
function format(s){
    return Math.floor(s/60)+":"+(s%60).toString().padStart(2,"0");
}

/* ---------- RENDER ---------- */
function render(){
    const el = document.getElementById("players");
    el.innerHTML = "";

    Object.values(data).forEach(updateTime);

    Object.values(data)
    .sort((a,b)=>a.time-b.time)
    .forEach((p,i)=>{

        let div = document.createElement("div");
        div.className = "player";

        if(p.time < 300) div.classList.add("warning");
        if(p.time < 60) div.classList.add("danger");

        div.innerHTML = `
            <b>${p.name}</b>
            <span>${format(p.time)}</span>

            <button onclick="pause('${p.id}')">Pause</button>
            <button onclick="resume('${p.id}')">Start</button>
            <button onclick="del('${p.id}')">X</button>
        `;

        el.appendChild(div);
    });
}

/* ---------- ACTIONS ---------- */

async function add(){
    let name = document.getElementById("name").value.trim();
    let min = parseInt(document.getElementById("minutes").value);

    if(!name || !min) return;

    let p = {
        name,
        time: min*60,
        running:true,
        last_update:new Date().toISOString()
    };

    await save(p);
}

async function pause(id){
    let p = data[id];
    updateTime(p);
    p.running = false;
    await save(p);
}

async function resume(id){
    let p = data[id];
    p.running = true;
    p.last_update = new Date().toISOString();
    await save(p);
}

/* ---------- GLOBAL ---------- */

async function addAll(){
    let min = parseInt(document.getElementById("allMinutes").value);
    if(!min) return;

    for(let id in data){
        let p = data[id];

        updateTime(p);

        p.time += min*60;
        p.running = true;
        p.last_update = new Date().toISOString();

        await save(p);
    }
}

async function pauseAll(){
    for(let id in data){
        let p = data[id];
        updateTime(p);
        p.running = false;
        await save(p);
    }
}

async function resumeAll(){
    for(let id in data){
        let p = data[id];
        p.running = true;
        p.last_update = new Date().toISOString();
        await save(p);
    }
}

async function clearAll(){
    await db.from("timers").delete().neq("id","");
    data = {};
}

/* ---------- INIT ---------- */

async function init(){
    await load();
    render();
}

init();
setInterval(render,1000);

</script>

</body>
</html>
