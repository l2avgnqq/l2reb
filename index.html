<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EXP L2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    background:#0b1220;
    color:#fff;
    font-family:Arial;
    padding:20px;
}

.top{
    text-align:center;
    margin-bottom:20px;
}

.players{
    max-width:900px;
    margin:auto;
}

.player{
    background:#162033;
    margin:8px 0;
    padding:12px;
    border-radius:12px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    transition:.15s;
}

.warn{background:#3a2c00}
.danger{background:#4a1010}

.idx{
    width:30px;
    color:#94a3b8;
    font-weight:bold;
}

.name{
    width:140px;
    font-weight:bold;
}

.time{
    width:120px;
    font-size:22px;
    font-weight:bold;
    color:#22c55e;
}

.actions{
    margin-left:auto;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

input{
    padding:8px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
    width:80px;
}

button{
    border:none;
    border-radius:10px;
    padding:8px 12px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.add{background:#2563eb}
.pause{background:#f59e0b}
.resume{background:#22c55e}
.del{background:#ef4444}
.global{background:#334155}
</style>
</head>

<body>

<div class="top">

<h2>EXP L2</h2>

<input id="name" placeholder="Имя">
<input id="min" type="number" placeholder="Мин">

<button class="add" onclick="addPlayer()">
Добавить
</button>

<br><br>

<input id="all" type="number" placeholder="+ всем">

<button class="add" onclick="addAll()">
+ всем
</button>

<br><br>

<button class="global" onclick="pauseAll()">
⏸ Пауза всем
</button>

<button class="global" onclick="resumeAll()">
▶ Старт всем
</button>

<button class="global" onclick="clearAll()">
🗑 Очистить
</button>

</div>

<div id="list" class="players"></div>

<script>

/* ================= SUPABASE ================= */

const db = supabase.createClient(
    "https://mxwtlfkhykqegzytotlq.supabase.co",
    "sb_publishable_-FajhSo3HLdy00i5VNemSA_89bLw5Qp"
);

/* ================= STATE ================= */

let players = {};

/* ================= HELPERS ================= */

const id = s =>
    s.replace(/[^a-z0-9]/gi,"_");

const fmt = s => {

    s=Math.max(0,s);

    let h=Math.floor(s/3600);
    let m=Math.floor((s%3600)/60);
    let sec=s%60;

    return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
};

const left = p => {

    if(!p.running || !p.last_update)
        return p.time;

    let diff=Math.floor(
        (Date.now()-new Date(p.last_update))/1000
    );

    return Math.max(0,p.time-diff);
};

/* ================= DB ================= */

async function load(){

    let {data}=await db
        .from("timers")
        .select("*");

    players={};

    (data||[]).forEach(
        p=>players[p.name]=p
    );
}

const save = p =>
    db.from("timers").upsert(p);

/* ================= CREATE ROW ================= */

function createRow(p){

    let pid=id(p.name);

    let div=document.createElement("div");

    div.className="player";
    div.id="r_"+pid;

    div.innerHTML=`

        <div class="idx"></div>

        <div class="name">
            ${p.name}
        </div>

        <div class="time" id="t_${pid}">
            0
        </div>

        <div class="actions">

            <button id="b_${pid}">
            </button>

            <input
                id="i_${pid}"
                type="number"
                placeholder="+мин"
            >

            <button
                class="add"
                onclick="addTime('${p.name}')"
            >
                +
            </button>

            <button
                class="del"
                onclick="removePlayer('${p.name}')"
            >
                🗑
            </button>

        </div>
    `;

    document
        .getElementById("list")
        .appendChild(div);
}

/* ================= RENDER ================= */

function render(){

    /* remove deleted */

    document
    .querySelectorAll(".player")
    .forEach(r=>{

        let rid=r.id.replace("r_","");

        let exists=Object.values(players)
        .some(p=>id(p.name)===rid);

        if(!exists){
            r.remove();
        }

    });

    /* create missing */

    Object.values(players)
    .forEach(p=>{

        let pid=id(p.name);

        if(!document.getElementById("r_"+pid)){
            createRow(p);
        }

    });

    updateTimers();
}

/* ================= UPDATE ================= */

function updateTimers(){

    let arr=Object.values(players)

    .map(p=>({
        ...p,
        remain:left(p)
    }))

    .sort((a,b)=>a.remain-b.remain);

    let list=document.getElementById("list");

    arr.forEach((p,i)=>{

        let pid=id(p.name);

        let row=document.getElementById("r_"+pid);

        if(!row) return;

        /* sort */

        list.appendChild(row);

        /* index */

        row.querySelector(".idx")
        .innerText=i+1;

        /* time */

        document.getElementById("t_"+pid)
        .innerText=fmt(p.remain);

        /* colors */

        row.classList.remove(
            "warn",
            "danger"
        );

        if(p.remain<=300)
            row.classList.add("warn");

        if(p.remain<=60)
            row.classList.add("danger");

        /* button */

        let btn=document.getElementById("b_"+pid);

        if(p.running){

            btn.innerText="⏸";
            btn.className="pause";
            btn.onclick=()=>pausePlayer(p.name);

        }else{

            btn.innerText="▶";
            btn.className="resume";
            btn.onclick=()=>resumePlayer(p.name);
        }

    });

}

/* ================= ACTIONS ================= */

async function addPlayer(){

    let name=nameInput.value.trim();

    let min=parseInt(minInput.value);

    if(!name || min<=0) return;

    let p=players[name] || {
        name,
        time:0,
        running:false,
        last_update:null
    };

    p.time=left(p)+min*60;

    p.running=true;

    p.last_update=
        new Date().toISOString();

    await save(p);

    nameInput.value="";
    minInput.value="";

    await load();

    render();
}

async function addTime(name){

    let v=parseInt(
        document.getElementById(
            "i_"+id(name)
        ).value
    );

    if(v<=0) return;

    let p=players[name];

    p.time=left(p)+v*60;

    p.running=true;

    p.last_update=
        new Date().toISOString();

    await save(p);

    await load();

    render();
}

async function pausePlayer(name){

    let p=players[name];

    p.time=left(p);

    p.running=false;

    p.last_update=null;

    await save(p);

    await load();

    render();
}

async function resumePlayer(name){

    let p=players[name];

    if(left(p)<=0) return;

    p.running=true;

    p.last_update=
        new Date().toISOString();

    await save(p);

    await load();

    render();
}

async function removePlayer(name){

    await db
        .from("timers")
        .delete()
        .eq("name",name);

    delete players[name];

    render();
}

async function addAll(){

    let v=parseInt(all.value);

    if(v<=0) return;

    for(let p of Object.values(players)){

        p.time=left(p)+v*60;

        p.running=true;

        p.last_update=
            new Date().toISOString();

        await save(p);
    }

    await load();

    render();
}

async function pauseAll(){

    for(let p of Object.values(players)){

        p.time=left(p);

        p.running=false;

        p.last_update=null;

        await save(p);
    }

    await load();

    render();
}

async function resumeAll(){

    for(let p of Object.values(players)){

        if(left(p)<=0) continue;

        p.running=true;

        p.last_update=
            new Date().toISOString();

        await save(p);
    }

    await load();

    render();
}

async function clearAll(){

    await db
        .from("timers")
        .delete()
        .neq("name","___");

    players={};

    render();
}

/* ================= REALTIME ================= */

db.channel("timers")

.on(
    "postgres_changes",
    {
        event:"*",
        schema:"public",
        table:"timers"
    },

    async ()=>{

        await load();

        render();

    }
)

.subscribe();

/* ================= INIT ================= */

const nameInput=
    document.getElementById("name");

const minInput=
    document.getElementById("min");

async function init(){

    await load();

    render();

    setInterval(updateTimers,1000);
}

init();

</script>

</body>
</html>
