<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EXP L2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#0b1220;color:#fff;font-family:Arial}
.top{text-align:center;padding:20px}
.players{max-width:1000px;margin:auto;padding:10px}

.player{
background:#162033;
margin:8px 0;
padding:12px;
border-radius:12px;
display:flex;
align-items:center;
gap:12px;
flex-wrap:wrap;
}

.idx{width:30px;color:#9ca3af;font-weight:bold}
.name{width:140px;font-weight:bold}
.time{width:130px;color:#22c55e;font-size:20px;font-weight:bold}

input{
padding:8px;
border-radius:10px;
border:none;
background:#0f172a;
color:#fff;
width:70px;
}

button{
padding:8px 12px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:bold;
}

.add{background:#3b82f6;color:#fff}
.pause{background:#f59e0b}
.resume{background:#22c55e}
.del{background:#ef4444}
.global{background:#334155;color:#fff}
.sound{background:#6366f1;color:#fff}

.warn{background:#2a1f00}
.danger{background:#3a0a0a}
.flash{animation:blink .8s infinite}

@keyframes blink{
0%{opacity:1}
50%{opacity:.4}
100%{opacity:1}
}

.actions{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap}
</style>
</head>

<body>

<div class="top">

<h2>EXP L2</h2>

<button class="sound" onclick="toggleSound()" id="soundBtn">🔊 Звук</button>

<br><br>

<input id="name" placeholder="Имя">
<input id="min" type="number" placeholder="Мин">
<button class="add" onclick="addPlayer()">Добавить</button>

<br><br>

<input id="all" type="number" placeholder="+ всем минут">
<button class="add" onclick="addAll()">+ всем</button>

<br><br>

<button class="global" onclick="pauseAll()">⏸ Пауза всем</button>
<button class="global" onclick="resumeAll()">▶ Старт всем</button>
<button class="global" onclick="clearAll()">🗑 Очистить</button>

</div>

<div id="list" class="players"></div>

<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<script>

const SUPABASE_URL="https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY="sb_publishable_-FajhSo3HLdy00i5VNemSA_89bLw5Qp";

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let players={};
let fired={};
let soundOn=true;

/* SOUND */

function toggleSound(){
soundOn=!soundOn;
document.getElementById("soundBtn").innerText =
soundOn ? "🔊 Звук ВКЛ" : "🔇 Звук ВЫКЛ";
}

function playSound(){
if(!soundOn) return;
const a=document.getElementById("alarm");
a.currentTime=0;
a.play().catch(()=>{});
}

/* TIME */

function fmt(s){
s=Math.max(0,s);
let h=Math.floor(s/3600);
let m=Math.floor((s%3600)/60);
let sec=s%60;
return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}

function remaining(p){
if(!p.running) return p.time;
let diff=Math.floor((Date.now()-new Date(p.last_update))/1000);
return Math.max(0,p.time-diff);
}

/* LOAD */

async function load(){
const {data}=await db.from("timers").select("*");
players={};
(data||[]).forEach(p=>players[p.name]=p);
draw();
}

/* DRAW */

function draw(){
const list=document.getElementById("list");
list.innerHTML="";

Object.values(players)
.sort((a,b)=>remaining(a)-remaining(b))
.forEach((p,i)=>{

let t=remaining(p);

let div=document.createElement("div");
div.className="player";

if(t<=300) div.classList.add("warn");
if(t<=60) div.classList.add("danger");
if(t<=30) div.classList.add("flash");

if(t<=0 && p.running){
p.running=false;
p.time=0;
save(p);

if(!fired[p.name]){
fired[p.name]=true;
playSound();
}
}

div.innerHTML=`
<div class="idx">${i+1}</div>
<div class="name">${p.name}</div>
<div class="time">${fmt(t)}</div>

<div class="actions">

${
p.running
? `<button class="pause" onclick="pause('${p.name}')">⏸</button>`
: `<button class="resume" onclick="resume('${p.name}')">▶</button>`
}

<input id="i_${p.name}" type="number" placeholder="+мин">
<button class="add" onclick="addTime('${p.name}')">+</button>
<button class="del" onclick="del('${p.name}')">🗑</button>

</div>
`;

list.appendChild(div);
});
}

/* SAVE */

async function save(p){
await db.from("timers").upsert(p);
}

/* ACTIONS */

async function addPlayer(){
const name=document.getElementById("name").value.trim();
const min=parseInt(document.getElementById("min").value,10);
if(!name||!min) return;

let p=players[name]||{name,time:0,running:false,last_update:null};

p.time=remaining(p)+min*60;
p.running=true;
p.last_update=new Date().toISOString();

fired[name]=false;

await save(p);
await load(); // <-- ВАЖНО FIX
}

async function addAll(){
const min=parseInt(document.getElementById("all").value,10);
if(!min) return;

for(let p of Object.values(players)){
p.time=remaining(p)+min*60;
p.running=true;
p.last_update=new Date().toISOString();
await save(p);
}

await load();
}

async function pause(name){
let p=players[name];
p.time=remaining(p);
p.running=false;
await save(p);
await load();
}

async function resume(name){
let p=players[name];
if(p.time<=0) return;
p.running=true;
p.last_update=new Date().toISOString();
await save(p);
await load();
}

async function del(name){
await db.from("timers").delete().eq("name",name);
delete players[name];
draw();
}

/* GLOBAL */

async function pauseAll(){
for(let p of Object.values(players)){
p.time=remaining(p);
p.running=false;
await save(p);
}
await load();
}

async function resumeAll(){
for(let p of Object.values(players)){
if(p.time<=0) continue;
p.running=true;
p.last_update=new Date().toISOString();
await save(p);
}
await load();
}

async function clearAll(){
await db.from("timers").delete().gt("time",-1);
players={};
draw();
}

/* INIT */

async function init(){
await load();
setInterval(draw,1000);
}

init();

</script>

</body>
</html>
