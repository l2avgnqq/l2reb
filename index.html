<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>EXP Lineage2</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#1a1a2e; color:#fff; }
.top { text-align:center; }

input, button {
    padding:6px;
    margin:3px;
    border-radius:6px;
    border:none;
}

button { cursor:pointer; font-weight:bold; }

.players {
    padding:20px;
    max-width:700px;
}

.player {
    display:flex;
    gap:10px;
    padding:8px;
    border-bottom:1px solid #444;
    align-items:center;
}

.warning { background:rgba(255,165,0,0.3); }
.danger { background:rgba(255,0,0,0.4); }

@keyframes blink {
    50% {opacity:0.3;}
}
</style>
</head>

<body>

<div class="top">
    <h2>EXP Lineage2</h2>

    <input id="name" placeholder="Ім'я">
    <input id="minutes" type="number" placeholder="Хв">
    <button onclick="add()">Додати</button>
</div>

<div id="players" class="players"></div>
<div id="adena">💰 0</div>

<script>
const db = supabase.createClient(
    "https://mxwtlfkhykqegzytotlq.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14d3RsZmtoeWtxZWd6eXRvdGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDI0NDIsImV4cCI6MjA4OTQ3ODQ0Mn0.S5riWE26dEnXANPF070BYmoUDqHgMyPcue-KRr-ugvE';
);

const ADENA_PER_SEC = 12000000 / 3600;

let data = {};
let alerted = {};

/* ---------- CORE ---------- */
function updatePlayer(p){
    try{
        if(!p.running) return;

        let last = p.last_update ? new Date(p.last_update) : new Date();
        let now = new Date();

        let diff = Math.floor((now - last)/1000);
        if(diff <= 0) return;

        let worked = Math.min(diff, p.time);

        p.time -= worked;
        p.adena += worked * ADENA_PER_SEC;
        p.last_update = now.toISOString();

        if(p.time <= 0){
            p.time = 0;
            p.running = false;
        }
    }catch(e){
        console.log("update error", e);
    }
}

/* ---------- LOAD ---------- */
async function load(){
    try{
        let res = await db.from("timers").select("*");

        if(!res || !res.data) return;

        let obj = {};

        res.data.forEach(p=>{
            obj[p.name] = {
                name:p.name,
                time:Number(p.time)||0,
                running:!!p.running,
                adena:Number(p.adena)||0,
                last_update:p.last_update || new Date().toISOString()
            };
        });

        data = obj;

    }catch(e){
        console.log("load error", e);
    }
}

/* ---------- SAVE ---------- */
async function save(name,p){
    try{
        await db.from("timers").upsert({
            name:name,
            time:p.time,
            running:p.running,
            adena:p.adena,
            last_update:p.last_update
        });
    }catch(e){
        console.log("save error", e);
    }
}

/* ---------- SOUND ---------- */
function playSound(){
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    audio.play();
}

/* ---------- RENDER ---------- */
function render(){
    const el = document.getElementById("players");
    el.innerHTML = "";

    let total = 0;

    Object.values(data).forEach(p=>{
        updatePlayer(p);
    });

    let arr = Object.values(data).sort((a,b)=> a.time - b.time);

    arr.forEach((p,i)=>{
        total += p.adena;

        if(p.time === 0 && !alerted[p.name]){
            playSound();
            alerted[p.name] = true;
        }

        let div = document.createElement("div");
        div.className = "player";

        if(p.time <= 300 && p.time > 60) div.classList.add("warning");

        if(p.time <= 60 && p.time > 0){
            div.classList.add("danger");
            div.style.animation = "blink 1s infinite";
        }

        div.innerHTML = `
            <b style="width:120px">${p.name}</b>
            <span style="width:80px">${Math.floor(p.time/60)}:${(p.time%60).toString().padStart(2,"0")}</span>
            <span style="width:120px">💰 ${Math.floor(p.adena).toLocaleString()}</span>

            <button onclick="pause('${p.name}')">⏸</button>
            <button onclick="resume('${p.name}')">▶</button>

            <input id="add_${p.name}" type="number" style="width:60px" placeholder="+хв">
            <button onclick="addTime('${p.name}')">+</button>

            <button onclick="removePlayer('${p.name}')">❌</button>
        `;

        el.appendChild(div);
    });

    document.getElementById("adena").innerText =
        "💰 " + Math.floor(total).toLocaleString();
}

/* ---------- ACTIONS ---------- */

async function add(){
    let name = document.getElementById("name").value.trim();
    let min = parseInt(document.getElementById("minutes").value);

    if(!name || !min) return;

    let p = data[name] || {time:0, adena:0};

    updatePlayer(p);

    p.time += min*60;
    p.running = true;
    p.last_update = new Date().toISOString();

    alerted[name] = false;

    data[name] = p;
    await save(name,p);
}

async function addTime(name){
    let val = parseInt(document.getElementById("add_"+name).value);
    if(!val) return;

    let p = data[name];

    updatePlayer(p);

    p.time += val*60;
    p.running = true;
    p.last_update = new Date().toISOString();

    alerted[name] = false;

    await save(name,p);
}

async function pause(name){
    let p = data[name];
    updatePlayer(p);
    p.running = false;
    await save(name,p);
}

async function resume(name){
    let p = data[name];
    p.running = true;
    p.last_update = new Date().toISOString();
    alerted[name] = false;
    await save(name,p);
}

async function removePlayer(name){
    await db.from("timers").delete().eq("name", name);
    delete data[name];
}

/* ---------- INIT ---------- */

load();
setInterval(render,1000);
</script>

</body>
</html>
