<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>L2 EXP System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    margin:0;
    font-family: 'Georgia', serif;
    background: url('https://i.imgur.com/3ZQ3ZQm.jpg') no-repeat center center fixed;
    background-size: cover;
    color:#f5e6c8;
    cursor: url('https://cur.cursors-4u.net/games/gam-10/gam969.cur'), auto;
}

/* dark overlay */
body::before {
    content:"";
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.75);
    z-index:-1;
}

h1 {
    text-align:center;
    color:#d4af37;
    text-shadow:0 0 10px black;
    margin-top:20px;
}

.top {
    text-align:center;
    margin-bottom:20px;
}

input {
    padding:8px;
    margin:4px;
    border:1px solid #d4af37;
    background:#111;
    color:#fff;
}

button {
    padding:8px 10px;
    margin:3px;
    border:none;
    cursor:pointer;
    font-weight:bold;
    background:#2b1b0f;
    color:#f5e6c8;
    border:1px solid #d4af37;
}

button:hover {
    background:#3a2415;
}

.players {
    max-width:800px;
    margin:auto;
    padding:10px;
}

.player {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px;
    margin:5px 0;
    background:rgba(0,0,0,0.6);
    border:1px solid #d4af37;
}

.player span {
    margin:0 5px;
}

.warning { border-color:orange; }
.danger { border-color:red; }

.icon {
    margin-right:5px;
}
</style>
</head>

<body>

<h1>⚔ L2 EXP CONTROL PANEL ⚔</h1>

<div class="top">

<input id="name" placeholder="Имя персонажа">
<input id="minutes" type="number" placeholder="Минуты">
<button onclick="add()">➕ Добавить</button>

<br>

<input id="allMinutes" type="number" placeholder="+ всем">
<button onclick="addAll()">⚡ Всем</button>

<br>

<button onclick="pauseAll()">⏸ Стоп всех</button>
<button onclick="resumeAll()">▶ Старт всех</button>
<button onclick="clearAll()">🧹 Очистить</button>

</div>

<div id="players" class="players"></div>

<script>

const SUPABASE_URL = "https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let data = {};

/* ---------- FIXED SAVE (MAIN BUG FIX) ---------- */
async function save(p){
    const { error } = await db
        .from("timers")
        .upsert(p, { onConflict: "name" });

    if(error){
        console.log("SUPABASE ERROR:", error.message);
    }
}

/* ---------- LOAD ---------- */
async function load(){
    const { data:rows, error } = await db
        .from("timers")
        .select("*");

    if(error){
        console.log(error.message);
        return;
    }

    let obj = {};
    rows.forEach(p => obj[p.name] = p);
    data = obj;
}

/* ---------- TIME ---------- */
function updateTime(p){
    if(!p.running) return;

    let last = new Date(p.last_update);
    let diff = Math.floor((Date.now() - last)/1000);

    let worked = Math.min(diff, p.time);

    p.time -= worked;
    p.last_update = new Date().toISOString();

    if(p.time <= 0){
        p.time = 0;
        p.running = false;
    }
}

/* ---------- FORMAT ---------- */
function format(s){
    let m = Math.floor(s/60);
    let sec = s%60;
    return m + ":" + sec.toString().padStart(2,"0");
}

/* ---------- RENDER ---------- */
function render(){
    const el = document.getElementById("players");
    el.innerHTML = "";

    Object.values(data).forEach(updateTime);

    let arr = Object.values(data).sort((a,b)=>a.time-b.time);

    arr.forEach((p,i)=>{

        let div = document.createElement("div");
        div.className = "player";

        if(p.time < 300) div.classList.add("warning");
        if(p.time < 60) div.classList.add("danger");

        div.innerHTML = `
            <span>⚔ ${i+1}</span>
            <span><b>${p.name}</b></span>
            <span>⏳ ${format(p.time)}</span>

            <button onclick="pause('${p.name}')">⏸</button>
            <button onclick="resume('${p.name}')">▶</button>

            <input id="add_${p.name}" style="width:60px" placeholder="+мин">
            <button onclick="addTime('${p.name}')">➕</button>

            <button onclick="del('${p.name}')">❌</button>
        `;

        el.appendChild(div);
    });
}

/* ---------- ACTIONS ---------- */

async function add(){
    let name = document.getElementById("name").value.trim();
    let min = parseInt(document.getElementById("minutes").value);

    if(!name || !min) return;

    let p = data[name] || {
        name,
        time:0,
        running:false,
        last_update:new Date().toISOString()
    };

    updateTime(p);

    p.time += min*60;
    p.running = true;
    p.last_update = new Date().toISOString();

    data[name] = p;

    await save(p);
}

async function addTime(name){
    let val = parseInt(document.getElementById("add_"+name).value);
    if(!val) return;

    let p = data[name];

    updateTime(p);

    p.time += val*60;
    p.running = true;
    p.last_update = new Date().toISOString();

    await save(p);
}

async function pause(name){
    let p = data[name];
    updateTime(p);
    p.running = false;
    await save(p);
}

async function resume(name){
    let p = data[name];
    p.running = true;
    p.last_update = new Date().toISOString();
    await save(p);
}

async function del(name){
    await db.from("timers").delete().eq("name", name);
    delete data[name];
}

/* ---------- GLOBAL ---------- */

async function addAll(){
    let min = parseInt(document.getElementById("allMinutes").value);
    if(!min) return;

    for(let n in data){
        let p = data[n];

        updateTime(p);

        p.time += min*60;
        p.running = true;
        p.last_update = new Date().toISOString();

        await save(p);
    }
}

async function pauseAll(){
    for(let n in data){
        let p = data[n];
        updateTime(p);
        p.running = false;
        await save(p);
    }
}

async function resumeAll(){
    for(let n in data){
        let p = data[n];
        p.running = true;
        p.last_update = new Date().toISOString();
        await save(p);
    }
}

async function clearAll(){
    await db.from("timers").delete().neq("name","");
    data = {};
}

/* ---------- REALTIME FIX ---------- */
function subscribe(){
    db.channel("l2-live")
    .on("postgres_changes",
        { event:"*", schema:"public", table:"timers" },
        () => load().then(render)
    )
    .subscribe();
}

/* ---------- INIT ---------- */

async function init(){
    await load();
    render();
    subscribe();
}

init();
setInterval(render, 1000);

</script>

</body>
</html>
