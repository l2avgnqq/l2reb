<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>EXP реборн</title>

<style>
body { font-family: Arial; background:#1a1a2e; color:#fff; text-align:center; }

input, button {
    padding:8px;
    margin:5px;
    border-radius:8px;
    border:none;
}

button { cursor:pointer; font-weight:bold; }

#addBtn { background:#e74c3c; color:white; } /* 🔥 новий колір */

.global { background:#34495e; color:white; }

.players {
    display:grid;
    grid-template-columns: repeat(3, 1fr); /* 🔥 3 в ряд */
    gap:15px;
    padding:20px;
}

.player {
    background:rgba(255,255,255,0.1);
    padding:10px;
    border-radius:10px;
}

.pause { background:#f39c12; }
.resume { background:#2ecc71; }
.add { background:#3498db; }

.expired { background:rgba(255,0,0,0.4); }
</style>

</head>
<body>

<h1>EXP л2</h1>

<input id="name" placeholder="Ім'я">
<input id="minutes" type="number" placeholder="Хв">
<button id="addBtn">Додати</button>

<br>
<button id="pauseAll" class="global">⏸ Пауза всім</button>
<button id="resumeAll" class="global">▶ Старт всім</button>

<div id="players" class="players"></div>

<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
(function(){

const SUPABASE_URL = "https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14d3RsZmtoeWtxZWd6eXRvdGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDI0NDIsImV4cCI6MjA4OTQ3ODQ0Mn0.S5riWE26dEnXANPF070BYmoUDqHgMyPcue-KRr-ugvE';

let db;

function wait(){
    if(window.supabase){
        db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        init();
    } else setTimeout(wait,100);
}

let data = {};
let notified = {};

function format(s){
    let m = Math.floor(s/60);
    let sec = s%60;
    return m+":"+(sec<10?"0":"")+sec;
}

function current(p){
    if(!p.running) return p.time;
    return Math.max(0, p.time - Math.floor((Date.now()-new Date(p.start))/1000));
}

function create(name){
    if(document.getElementById(name)) return;

    const div = document.createElement("div");
    div.id = name;
    div.className = "player";

    div.innerHTML = `
        <b>${name}</b><br>
        <span class="time">0:00</span><br><br>

        <button class="pause">⏸</button>
        <button class="resume">▶</button><br><br>

        <input type="number" placeholder="+хв">
        <button class="add">+</button>
    `;

    document.getElementById("players").appendChild(div);

    div.querySelector(".pause").onclick = async ()=>{
        let p = data[name];
        p.time = current(p);
        p.running = false;
        await save(name,p);
    };

    div.querySelector(".resume").onclick = async ()=>{
        let p = data[name];
        p.start = new Date().toISOString();
        p.running = true;
        await save(name,p);
    };

    div.querySelector(".add").onclick = async ()=>{
        let val = parseInt(div.querySelector("input").value);
        if(!val) return;

        let p = data[name];
        p.time = current(p) + val*60;
        p.start = new Date().toISOString();
        p.running = true;

        notified[name]=false;
        div.classList.remove("expired");

        await save(name,p);
    };
}

async function save(name,p){
    const { error } = await db.from("timers").upsert({
        name:name,
        time:p.time,
        running:p.running,
        start:p.start
    });

    if(error) console.log("SAVE ERROR:", error);
}

async function load(){
    const {data:rows} = await db.from("timers").select("*");

    rows.forEach(p=>{
        data[p.name]=p;
        create(p.name);
    });
}

function update(){
    for(let name in data){
        let p = data[name];
        let t = current(p);

        let el = document.querySelector("#"+name+" .time");
        let div = document.getElementById(name);

        if(el){
            el.innerText = format(t);

            if(t===0){
                div.classList.add("expired");

                if(!notified[name]){
                    document.getElementById("alarm").play();
                    notified[name]=true;
                }
            }
        }
    }
}

async function add(){
    const name = document.getElementById("name").value;
    const min = parseInt(document.getElementById("minutes").value);

    if(!name || !min) return;

    if(data[name]){
        // 🔥 якщо вже є — додаємо час
        let p = data[name];
        p.time = current(p) + min*60;
        p.start = new Date().toISOString();
        p.running = true;
        await save(name,p);
        return;
    }

    let p = {
        time:min*60,
        running:true,
        start:new Date().toISOString()
    };

    data[name]=p;
    create(name);
    await save(name,p);
}

function pauseAll(){
    for(let name in data){
        let p = data[name];
        p.time = current(p);
        p.running = false;
        save(name,p);
    }
}

function resumeAll(){
    for(let name in data){
        let p = data[name];
        p.start = new Date().toISOString();
        p.running = true;
        save(name,p);
    }
}

function init(){
    document.getElementById("addBtn").onclick = add;
    document.getElementById("pauseAll").onclick = pauseAll;
    document.getElementById("resumeAll").onclick = resumeAll;

    load();
    setInterval(update,1000);
    setInterval(load,2000);
}

wait();

})();
</script>

</body>
</html>
