<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Supabase Test</title>
</head>
<body>
<h1>Supabase Test</h1>
<input id="nameInput" placeholder="Ім'я">
<button id="addBtn">Додати</button>
<div id="output"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.umd.js"></script>
<script>
const SUPABASE_URL = 'sb_publishable_GTPV803deiaeT6Tikf3HHg_IknudqlS';
const SUPABASE_ANON_KEY = 'sb_secret_kxJ86TvCukyUIAaZcrTQ9w_vNoC3szF';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

document.getElementById('addBtn').onclick = async () => {
    const name = document.getElementById('nameInput').value.trim();
    if(!name) return alert('Введіть ім’я');

    const {data, error} = await supabase.from('timers').upsert({
        name: name,
        time: 60,
        running: true,
        start: new Date().toISOString()
    });

    if(error) {
        document.getElementById('output').innerText = 'Помилка: ' + error.message;
    } else {
        document.getElementById('output').innerText = 'Додано: ' + JSON.stringify(data);
    }
};
</script>
</body>
</html>
