<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>EXP Lineage2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#1a1a2e; color:#fff; }
.top { text-align:center; }

input, button {
    padding:6px;
    margin:3px;
    border-radius:6px;
    border:none;
}

button { cursor:pointer; font-weight:bold; }

#addBtn { background:#e74c3c; color:white; }

.players {
    padding:20px;
    max-width:700px;
}

.player {
    display:flex;
    gap:10px;
    padding:8px;
    border-bottom:1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="top">

    <h1>EXP Lineage2</h1>

    <input id="name" placeholder="Имя">
    <input id="minutes" type="number" placeholder="Минуты">
    <button id="addBtn">Добавить</button>

</div>

<div id="players" class="players"></div>

<script>

const SUPABASE_URL = "https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY = "ВСТАВ СЮДА СВОЙ ANON KEY";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let data = {};

/* ---------- LOAD ---------- */
async function load(){
    const { data: rows, error } = await db
        .from("timers")
        .select("*");

    if(error){
        console.log(error);
        return;
    }

    data = {};
    (rows || []).forEach(p=>{
        data[p.name] = p;
    });
}

/* ---------- SAVE ---------- */
async function save(p){
    const { error } = await db
        .from("timers")
        .upsert(p, { onConflict: "name" });

    if(error){
        console.log(error);
    }
}

/* ---------- ADD ---------- */
async function add(){

    const name = document.getElementById("name").value.trim();
    const min = parseInt(document.getElementById("minutes").value);

    if(!name || !min){
        alert("Введи ім'я і хвилини");
        return;
    }

    let p = data[name] || {
        name,
        time: 0,
        running: false,
        last_update: new Date().toISOString()
    };

    p.time += min * 60;
    p.running = true;
    p.last_update = new Date().toISOString();

    await save(p);
    await load();
    render();
}

/* ---------- DELETE ---------- */
async function delPlayer(name){
    await db.from("timers").delete().eq("name", name);
    delete data[name];
    render();
}

/* ---------- RENDER ---------- */
function render(){

    const container = document.getElementById("players");
    container.innerHTML = "";

    const arr = Object.values(data);

    arr.forEach((p,i)=>{

        const div = document.createElement("div");
        div.className = "player";

        div.innerHTML = `
            <span>${i+1}. ${p.name}</span>
            <span>${Math.floor(p.time/60)}:${(p.time%60).toString().padStart(2,"0")}</span>
            <button onclick="delPlayer('${p.name}')">❌</button>
        `;

        container.appendChild(div);
    });
}

/* ---------- INIT ---------- */
async function init(){
    await load();
    render();
}

init();

document.getElementById("addBtn").onclick = add;

</script>

</body>
</html>
