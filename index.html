<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>EXP </title>

<style>
body { font-family: Arial; background:#1a1a2e; color:#fff; text-align:center; }
input, button { padding:10px; margin:5px; border-radius:8px; border:none; }
button { cursor:pointer; background:#00adb5; color:white; }
.player { background:rgba(255,255,255,0.1); margin:10px; padding:10px; border-radius:10px; }
</style>

</head>
<body>

<h1>EXP </h1>

<input id="name" placeholder="Ім'я">
<input id="minutes" type="number" placeholder="Хвилини">
<button id="add">Додати</button>

<div id="list"></div>

<!-- ПРАВИЛЬНИЙ SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

const SUPABASE_URL = "https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14d3RsZmtoeWtxZWd6eXRvdGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDI0NDIsImV4cCI6MjA4OTQ3ODQ0Mn0.S5riWE26dEnXANPF070BYmoUDqHgMyPcue-KRr-ugvE';

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const list = document.getElementById("list");

async function load(){
    const { data, error } = await db.from("timers").select("*");

    if(error){
        console.log("LOAD ERROR:", error);
        return;
    }

    list.innerHTML = "";

    data.forEach(p=>{
        const div = document.createElement("div");
        div.className = "player";
        div.innerHTML = `<b>${p.name}</b> — ${p.time} сек`;
        list.appendChild(div);
    });
}

async function add(){
    const name = document.getElementById("name").value;
    const min = parseInt(document.getElementById("minutes").value);

    if(!name || !min) return;

    const { error } = await db.from("timers").insert({
        name: name,
        time: min * 60
    });

    if(error){
        console.log("SAVE ERROR:", error);
    }

    load();
}

document.getElementById("add").onclick = add;

load();

});
</script>

</body>
</html>
