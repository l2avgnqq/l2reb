<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>EXP Lineage2</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { background:#1a1a2e; color:#fff; font-family:Arial; }
.top { text-align:center; }

input, button {
    padding:6px;
    margin:3px;
    border-radius:6px;
    border:none;
}

button { cursor:pointer; }

.players { padding:20px; }

.player {
    display:flex;
    gap:10px;
    padding:6px;
    border-bottom:1px solid #444;
}
</style>
</head>

<body>

<div class="top">
    <input id="name" placeholder="Ім'я">
    <input id="minutes" type="number" placeholder="Хв">
    <button onclick="add()">Додати</button>

    <br>

    <input id="allMinutes" type="number" placeholder="+хв всім">
    <button onclick="addAll()">Додати всім</button>

    <br>

    <button onclick="pauseAll()">⏸ Пауза всім</button>
    <button onclick="resumeAll()">▶ Старт всім</button>
</div>

<div id="players" class="players"></div>
<div id="adena">💰 0</div>

<script>
const db = supabase.createClient(
    "https://mxwtlfkhykqegzytotlq.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14d3RsZmtoeWtxZWd6eXRvdGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDI0NDIsImV4cCI6MjA4OTQ3ODQ0Mn0.S5riWE26dEnXANPF070BYmoUDqHgMyPcue-KRr-ugvE";
);

const ADENA_PER_SEC = 12000000 / 3600;

let data = {};

/* ---------- CORE ---------- */
function updatePlayer(p){
    if(!p.running) return;

    let last = new Date(p.last_update);
    let now = new Date();

    let diff = Math.floor((now - last)/1000);
    if(diff <= 0) return;

    let worked = Math.min(diff, p.time);

    p.time -= worked;
    p.adena += worked * ADENA_PER_SEC;
    p.last_update = now.toISOString();

    if(p.time <= 0){
        p.time = 0;
        p.running = false;
    }
}

/* ---------- LOAD ---------- */
async function load(){
    let {data:rows} = await db.from("timers").select("*");

    if(!rows) return;

    let obj = {};

    rows.forEach(p=>{
        obj[p.name] = {
            name:p.name,
            time:Number(p.time)||0,
            running:p.running,
            adena:Number(p.adena)||0,
            last_update:p.last_update || new Date().toISOString()
        };
    });

    data = obj;
}

/* ---------- REALTIME ---------- */
db.channel("timers")
.on("postgres_changes",
{ event:"*", schema:"public", table:"timers" },
()=> load())
.subscribe();

/* ---------- SAVE ---------- */
async function save(p){
    await db.from("timers").upsert(p);
}

/* ---------- RENDER ---------- */
function render(){
    const container = document.getElementById("players");
    container.innerHTML = "";

    let total = 0;

    Object.values(data).forEach(p=> updatePlayer(p));

    Object.values(data).forEach(p=>{
        total += p.adena;

        const div = document.createElement("div");
        div.className = "player";

        div.innerHTML = `
            <b>${p.name}</b>
            ${Math.floor(p.time/60)}:${(p.time%60).toString().padStart(2,"0")}
            💰 ${Math.floor(p.adena)}

            <button onclick="pause('${p.name}')">⏸</button>
            <button onclick="resume('${p.name}')">▶</button>
            <button onclick="addTime('${p.name}')">+10</button>
            <button onclick="del('${p.name}')">❌</button>
        `;

        container.appendChild(div);
    });

    document.getElementById("adena").innerText =
        "💰 " + Math.floor(total).toLocaleString();
}

/* ---------- ACTIONS ---------- */

async function add(){
    let name = document.getElementById("name").value.trim();
    let min = parseInt(document.getElementById("minutes").value);
    if(!name || !min) return;

    let p = data[name] || {name:name, time:0, adena:0};

    updatePlayer(p);

    p.time += min*60;
    p.running = true;
    p.last_update = new Date().toISOString();

    data[name] = p;
    await save(p);
}

async function addAll(){
    let min = parseInt(document.getElementById("allMinutes").value);
    if(!min) return;

    for(let name in data){
        let p = data[name];

        updatePlayer(p);

        p.time += min*60;
        p.running = true;
        p.last_update = new Date().toISOString();

        await save(p);
    }
}

async function pause(name){
    let p = data[name];
    updatePlayer(p);
    p.running = false;
    await save(p);
}

async function resume(name){
    let p = data[name];
    p.running = true;
    p.last_update = new Date().toISOString();
    await save(p);
}

async function addTime(name){
    let p = data[name];

    updatePlayer(p);

    p.time += 600;
    p.running = true;
    p.last_update = new Date().toISOString();

    await save(p);
}

async function pauseAll(){
    for(let name in data){
        let p = data[name];
        updatePlayer(p);
        p.running = false;
        save(p);
    }
}

async function resumeAll(){
    for(let name in data){
        let p = data[name];
        p.running = true;
        p.last_update = new Date().toISOString();
        save(p);
    }
}

async function del(name){
    await db.from("timers").delete().eq("name", name);
    delete data[name];
}

/* ---------- INIT ---------- */

load();
setInterval(render,1000);
</script>

</body>
</html>
