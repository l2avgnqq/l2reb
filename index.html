<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>EXP Timer</title>

<style>
body { font-family: Arial; background:#1a1a2e; color:#fff; text-align:center; }
input, button { padding:10px; margin:5px; border-radius:8px; border:none; }
button { cursor:pointer; background:#00adb5; color:white; }
.player { background:rgba(255,255,255,0.1); margin:10px; padding:10px; border-radius:10px; }
</style>

</head>
<body>

<h1>EXP Timer</h1>

<input id="name" placeholder="Ім'я">
<input id="minutes" type="number" placeholder="Хвилини">
<button id="addBtn">Додати</button>

<div id="list"></div>

<!-- ГАРАНТОВАНО ПРАЦЮЮЧИЙ SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
(function(){

// 🔥 ЛОГ щоб перевірити що JS працює
console.log("JS OK");

// 🔑 ТВОЇ ДАНІ
const SUPABASE_URL = "https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14d3RsZmtoeWtxZWd6eXRvdGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDI0NDIsImV4cCI6MjA4OTQ3ODQ0Mn0.S5riWE26dEnXANPF070BYmoUDqHgMyPcue-KRr-ugvE";

let db;

// 🔧 Чекаємо поки supabase підгрузиться
function waitForSupabase(){
    if(window.supabase){
        db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        init();
    } else {
        setTimeout(waitForSupabase, 100);
    }
}

function init(){
    console.log("INIT OK");

    const btn = document.getElementById("addBtn");

    if(!btn){
        console.log("BUTTON NOT FOUND");
        return;
    }

    btn.addEventListener("click", addPlayer);

    load();
}

async function load(){
    const { data, error } = await db.from("timers").select("*");

    if(error){
        console.log("LOAD ERROR:", error);
        return;
    }

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(p=>{
        const div = document.createElement("div");
        div.className = "player";
        div.innerHTML = `<b>${p.name}</b> — ${p.time} сек`;
        list.appendChild(div);
    });
}

async function addPlayer(){
    alert("Клік працює ✅");

    const name = document.getElementById("name").value;
    const min = parseInt(document.getElementById("minutes").value);

    if(!name || !min){
        alert("Введи дані");
        return;
    }

    const { error } = await db.from("timers").insert({
        name: name,
        time: min * 60
    });

    if(error){
        console.log("SAVE ERROR:", error);
        alert("Помилка запису");
        return;
    }

    load();
}

// старт
waitForSupabase();

})();
</script>

</body>
</html>
