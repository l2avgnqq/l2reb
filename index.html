let db;

try {
    db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e){
    alert("SUPABASE ERROR");
}

const ADENA_PER_SEC = 12000000 / 3600;

let data = {};

/* ---------- CORE ---------- */
function updatePlayer(p){
    if(!p.running) return;

    let last = new Date(p.last_update);
    let now = new Date();

    let diff = Math.floor((now - last)/1000);
    if(diff <= 0) return;

    let worked = Math.min(diff, p.time);

    p.time -= worked;
    p.adena += worked * ADENA_PER_SEC;
    p.last_update = now.toISOString();

    if(p.time <= 0){
        p.time = 0;
        p.running = false;
    }
}

/* ---------- LOAD ---------- */
async function load(){
    try{
        let res = await db.from("timers").select("*");

        if(res.error){
            console.log("DB ERROR:", res.error);
            return;
        }

        let obj = {};
        res.data.forEach(p=>{
            obj[p.name] = p;
        });

        data = obj;

        console.log("LOADED:", data);

    }catch(e){
        console.log("LOAD CRASH:", e);
    }
}

/* ---------- SAVE ---------- */
async function save(p){
    try{
        let res = await db.from("timers").upsert(p);

        if(res.error){
            console.log("SAVE ERROR:", res.error);
        } else {
            console.log("SAVED:", p);
        }

    }catch(e){
        console.log("SAVE CRASH:", e);
    }
}

/* ---------- RENDER ---------- */
function render(){
    let container = document.getElementById("players");
    container.innerHTML = "";

    let total = 0;

    Object.values(data).forEach(p=>{
        updatePlayer(p);
        total += p.adena;

        let div = document.createElement("div");

        div.innerHTML = `
            <b>${p.name}</b>
            ${Math.floor(p.time/60)}:${(p.time%60).toString().padStart(2,"0")}
            💰 ${Math.floor(p.adena)}

            <button onclick="pause('${p.name}')">⏸</button>
            <button onclick="resume('${p.name}')">▶</button>
            <button onclick="del('${p.name}')">❌</button>
        `;

        container.appendChild(div);
    });

    document.getElementById("adena").innerText =
        "💰 " + Math.floor(total);
}

/* ---------- ACTIONS ---------- */

async function add(){
    let name = document.getElementById("name").value.trim();
    let min = parseInt(document.getElementById("minutes").value);

    if(!name || !min) return;

    let p = data[name] || {
        name:name,
        time:0,
        adena:0,
        running:false,
        last_update:new Date().toISOString()
    };

    updatePlayer(p);

    p.time += min*60;
    p.running = true;
    p.last_update = new Date().toISOString();

    data[name] = p;

    await save(p);
}

async function pause(name){
    let p = data[name];
    updatePlayer(p);
    p.running = false;
    await save(p);
}

async function resume(name){
    let p = data[name];
    p.running = true;
    p.last_update = new Date().toISOString();
    await save(p);
}

async function del(name){
    try{
        let res = await db.from("timers").delete().eq("name", name);

        if(res.error){
            console.log("DELETE ERROR:", res.error);
        }

    }catch(e){
        console.log("DELETE CRASH:", e);
    }

    delete data[name];
}

/* ---------- INIT ---------- */

window.addEventListener("load", async ()=>{
    await load();
    render();
});

setInterval(render,1000);
</script>
