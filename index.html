<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EXP Lineage2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    margin:0;
    padding:0;
    background:#111827;
    color:white;
    font-family:Arial;
}

.top{
    text-align:center;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

input,button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    margin:4px;
    font-size:14px;
}

input{
    background:#1f2937;
    color:white;
}

button{
    cursor:pointer;
    font-weight:bold;
    transition:0.15s;
}

button:hover{
    opacity:0.92;
    transform:scale(1.03);
}

.players{
    max-width:1200px;
    margin:auto;
    padding:15px;
}

.player{

    background:#1e293b;

    border-radius:14px;

    padding:14px;

    margin-bottom:10px;

    display:flex;
    align-items:center;
    gap:12px;

    flex-wrap:wrap;
}

.warning{
    background:#5a3b00;
}

.danger{
    background:#5a0000;
}

.playerIndex{
    width:30px;
    color:#aaa;
}

.playerName{
    width:180px;
    font-weight:bold;
    overflow:hidden;
}

.playerTime{
    width:120px;
    color:#00ff95;
    font-size:24px;
    font-weight:bold;
}

.smallInput{
    width:70px;
}

.pauseBtn{
    background:#f39c12;
    color:white;
}

.resumeBtn{
    background:#2ecc71;
    color:white;
}

.deleteBtn{
    background:#e74c3c;
    color:white;
}

.addBtn{
    background:#3498db;
    color:white;
}

.global{
    background:#6b7280;
    color:white;
}

@media(max-width:768px){

    .player{
        flex-direction:column;
        align-items:flex-start;
    }

    .playerName,
    .playerTime{
        width:100%;
    }

}

</style>
</head>

<body>

<div class="top">

<h1>EXP Lineage2</h1>

<input id="name" placeholder="Имя">

<input
    id="minutes"
    type="number"
    placeholder="Минуты"
>

<button onclick="addPlayer()" class="addBtn">
Добавить
</button>

<br>

<input
    id="allMinutes"
    type="number"
    placeholder="+ всем минут"
>

<button onclick="addAll()" class="addBtn">
Добавить всем
</button>

<br><br>

<button onclick="pauseAll()" class="global">
Пауза всем
</button>

<button onclick="resumeAll()" class="global">
Старт всем
</button>

<button onclick="clearAll()" class="global">
Очистить
</button>

</div>

<div id="players" class="players"></div>

<audio id="alarm" preload="auto">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

/* =========================
   SUPABASE
========================= */

const SUPABASE_URL =
"https://mxwtlfkhykqegzytotlq.supabase.co";

const SUPABASE_KEY =
"sb_publishable_-FajhSo3HLdy00i5VNemSA_89bLw5Qp";

const db = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

/* =========================
   DATA
========================= */

let players = {};

let notified = {};

/* =========================
   FORMAT TIME
========================= */

function formatTime(sec){

    sec = Math.max(0, sec);

    const h = Math.floor(sec / 3600);

    const m = Math.floor((sec % 3600) / 60);

    const s = sec % 60;

    return [

        h,

        String(m).padStart(2,"0"),

        String(s).padStart(2,"0")

    ].join(":");

}

/* =========================
   GET REMAINING
========================= */

function getRemaining(p){

    if(!p.running){

        return p.duration;

    }

    const passed = Math.floor(

        (Date.now() -
        new Date(p.started_at)) / 1000

    );

    return Math.max(
        0,
        p.duration - passed
    );

}

/* =========================
   LOAD
========================= */

async function loadPlayers(){

    const { data, error } = await db
        .from("timers")
        .select("*");

    if(error){

        console.log(error);

        return;

    }

    players = {};

    (data || []).forEach(p=>{

        players[p.name] = p;

    });

}

/* =========================
   SAVE
========================= */

async function savePlayer(p){

    const { error } = await db
        .from("timers")
        .upsert(p);

    if(error){

        console.log(error);

    }

}

/* =========================
   NOTIFICATION
========================= */

function playAlarm(name){

    try{

        const audio =
        document.getElementById("alarm");

        audio.currentTime = 0;

        audio.play();

    }catch(e){}

    document.title =
    "⏰ EXP закончился: " + name;

    if("Notification" in window){

        if(Notification.permission === "granted"){

            new Notification(
                "EXP закончилось",
                {
                    body:name
                }
            );

        }

    }

}

/* =========================
   RENDER
========================= */

function render(){

    const container =
    document.getElementById("players");

    container.innerHTML = "";

    const arr = Object.values(players)

    .sort((a,b)=>

        getRemaining(a) -
        getRemaining(b)

    );

    arr.forEach((p,index)=>{

        const remain =
        getRemaining(p);

        if(remain <= 0 && p.running){

            p.running = false;

            p.duration = 0;

            savePlayer(p);

            if(!notified[p.name]){

                notified[p.name] = true;

                playAlarm(p.name);

            }

        }

        const div =
        document.createElement("div");

        div.className = "player";

        if(remain <= 300 && remain > 60){

            div.classList.add("warning");

        }

        if(remain <= 60){

            div.classList.add("danger");

        }

        const controls = p.running

        ?

        `
        <button
            class="pauseBtn"
            onclick="pausePlayer('${p.name}')"
        >
            Пауза
        </button>
        `

        :

        `
        <button
            class="resumeBtn"
            onclick="resumePlayer('${p.name}')"
        >
            Старт
        </button>
        `;

        div.innerHTML = `

        <div class="playerIndex">
            ${index+1}
        </div>

        <div class="playerName">
            ${p.name}
        </div>

        <div class="playerTime">
            ${formatTime(remain)}
        </div>

        ${controls}

        <input
            type="number"
            id="add_${p.name}"
            class="smallInput"
            placeholder="мин"
        >

        <button
            class="addBtn"
            onclick="addTime('${p.name}')"
        >
            Добавить
        </button>

        <button
            class="deleteBtn"
            onclick="deletePlayer('${p.name}')"
        >
            Удалить
        </button>

        `;

        container.appendChild(div);

    });

}

/* =========================
   ADD PLAYER
========================= */

async function addPlayer(){

    const name = document
        .getElementById("name")
        .value
        .trim();

    const min = parseInt(

        document
        .getElementById("minutes")
        .value,

        10

    );

    if(!name || !min){

        alert("Введите имя и минуты");

        return;

    }

    let p = players[name];

    if(!p){

        p = {

            name,

            duration:0,

            started_at:null,

            running:false

        };

    }

    const remain =
    getRemaining(p);

    p.duration =
    remain + min * 60;

    p.running = true;

    p.started_at =
    new Date().toISOString();

    notified[name] = false;

    await savePlayer(p);

}

/* =========================
   ADD TIME
========================= */

async function addTime(name){

    const val = parseInt(

        document
        .getElementById("add_"+name)
        .value,

        10

    );

    if(!val){

        return;

    }

    const p = players[name];

    const remain =
    getRemaining(p);

    p.duration =
    remain + val * 60;

    p.running = true;

    p.started_at =
    new Date().toISOString();

    notified[name] = false;

    await savePlayer(p);

}

/* =========================
   PAUSE
========================= */

async function pausePlayer(name){

    const p = players[name];

    p.duration =
    getRemaining(p);

    p.running = false;

    await savePlayer(p);

}

/* =========================
   RESUME
========================= */

async function resumePlayer(name){

    const p = players[name];

    if(p.duration <= 0){

        return;

    }

    p.running = true;

    p.started_at =
    new Date().toISOString();

    await savePlayer(p);

}

/* =========================
   DELETE
========================= */

async function deletePlayer(name){

    await db
        .from("timers")
        .delete()
        .eq("name", name);

}

/* =========================
   GLOBAL
========================= */

async function addAll(){

    const min = parseInt(

        document
        .getElementById("allMinutes")
        .value,

        10

    );

    if(!min){

        return;

    }

    await Promise.all(

        Object.values(players)
        .map(async p=>{

            const remain =
            getRemaining(p);

            p.duration =
            remain + min * 60;

            p.running = true;

            p.started_at =
            new Date().toISOString();

            return savePlayer(p);

        })

    );

}

async function pauseAll(){

    await Promise.all(

        Object.values(players)
        .map(async p=>{

            p.duration =
            getRemaining(p);

            p.running = false;

            return savePlayer(p);

        })

    );

}

async function resumeAll(){

    await Promise.all(

        Object.values(players)
        .map(async p=>{

            if(p.duration <= 0){

                return;

            }

            p.running = true;

            p.started_at =
            new Date().toISOString();

            return savePlayer(p);

        })

    );

}

async function clearAll(){

    await db
        .from("timers")
        .delete()
        .gt("duration",-1);

}

/* =========================
   INIT
========================= */

async function init(){

    if("Notification" in window){

        Notification.requestPermission();

    }

    await loadPlayers();

    render();

}

init();

/* =========================
   REALTIME
========================= */

db.channel("timers")

.on(
    "postgres_changes",

    {
        event:"*",
        schema:"public",
        table:"timers"
    },

    async ()=>{

        await loadPlayers();

        render();

    }

)

.subscribe();

/* =========================
   LIVE TIMER
========================= */

setInterval(render, 1000);

</script>

</body>
</html>
