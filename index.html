<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EXP L2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#111827;color:#fff;font-family:Arial}
.top{text-align:center;padding:20px}
.players{max-width:1000px;margin:auto;padding:10px}
.player{background:#1f2937;margin:8px 0;padding:12px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.name{width:150px;font-weight:bold}
.time{width:120px;color:#00ff95;font-size:20px;font-weight:bold}
button,input{padding:8px;border-radius:8px;border:none;margin:3px}
button{cursor:pointer}
.add{background:#3498db;color:#fff}
.pause{background:#f39c12}
.resume{background:#2ecc71}
.del{background:#e74c3c}
.global{background:#6b7280;color:#fff}
</style>
</head>

<body>

<div class="top">

<h2>EXP Lineage2</h2>

<button onclick="unlockSound()">🔊 Включить звук</button>

<br><br>

<input id="name" placeholder="Имя">
<input id="min" type="number" placeholder="Мин">
<button class="add" onclick="addPlayer()">Добавить</button>

<br><br>

<input id="all" type="number" placeholder="+ всем минут">
<button class="add" onclick="addAll()">+ всем</button>

<br>

<button class="global" onclick="pauseAll()">Пауза всем</button>
<button class="global" onclick="resumeAll()">Старт всем</button>
<button class="global" onclick="clearAll()">Очистить</button>

</div>

<div id="list" class="players"></div>

<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" preload="auto"></audio>

<script>

/* ===== SUPABASE ===== */

const SUPABASE_URL="https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY="sb_publishable_-FajhSo3HLdy00i5VNemSA_89bLw5Qp";

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

/* ===== DATA ===== */

let players={};
let fired={};
let soundUnlocked=false;

/* ===== SOUND ===== */

function unlockSound(){
    const a=document.getElementById("alarm");
    a.play().then(()=>a.pause()).catch(()=>{});
    soundUnlocked=true;
    alert("Звук включен");
}

function playSound(){
    const a=document.getElementById("alarm");
    a.currentTime=0;

    a.play().catch(()=>{

        // fallback если браузер всё ещё блокирует
        alert("ВРЕМЯ ВЫШЛО!");

    });

    document.title="⏰ TIME OUT";
}

/* ===== TIME ===== */

function fmt(s){
    s=Math.max(0,s);
    let h=Math.floor(s/3600);
    let m=Math.floor((s%3600)/60);
    let sec=s%60;
    return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}

function remaining(p){
    if(!p.running) return p.time;

    let diff=Math.floor((Date.now()-new Date(p.last_update))/1000);
    return Math.max(0,p.time-diff);
}

/* ===== LOAD/SAVE ===== */

async function load(){
    let {data}=await db.from("timers").select("*");
    players={};
    (data||[]).forEach(p=>players[p.name]=p);
}

async function save(p){
    await db.from("timers").upsert(p);
}

/* ===== RENDER ===== */

function render(){

    let list=document.getElementById("list");
    list.innerHTML="";

    Object.values(players)
    .sort((a,b)=>remaining(a)-remaining(b))
    .forEach((p,i)=>{

        let t=remaining(p);

        if(t<=0 && p.running){

            p.running=false;
            p.time=0;
            save(p);

            if(!fired[p.name]){
                fired[p.name]=true;
                playSound();
            }
        }

        list.innerHTML+=`
        <div class="player">
            <div>${i+1}</div>
            <div class="name">${p.name}</div>
            <div class="time">${fmt(t)}</div>

            ${
                p.running
                ? `<button class="pause" onclick="pause('${p.name}')">Пауза</button>`
                : `<button class="resume" onclick="resume('${p.name}')">Старт</button>`
            }

            <input id="add_${p.name}" type="number" style="width:60px">
            <button class="add" onclick="addTime('${p.name}')">+мин</button>
            <button class="del" onclick="del('${p.name}')">Удалить</button>
        </div>`;
    });
}

/* ===== ACTIONS ===== */

async function addPlayer(){

    let name=document.getElementById("name").value.trim();
    let min=parseInt(document.getElementById("min").value,10);

    if(!name||!min) return;

    let p=players[name]||{name,time:0,running:false,last_update:null};

    p.time=remaining(p)+min*60;
    p.running=true;
    p.last_update=new Date().toISOString();

    fired[name]=false;

    await save(p);
    await load();
    render();
}

async function addTime(name){

    let v=parseInt(document.getElementById("add_"+name).value,10);
    if(!v) return;

    let p=players[name];

    p.time=remaining(p)+v*60;
    p.running=true;
    p.last_update=new Date().toISOString();

    fired[name]=false;

    await save(p);
    await load();
    render();
}

async function pause(name){
    let p=players[name];
    p.time=remaining(p);
    p.running=false;
    await save(p);
    await load();
    render();
}

async function resume(name){
    let p=players[name];
    if(p.time<=0) return;
    p.running=true;
    p.last_update=new Date().toISOString();
    await save(p);
    await load();
    render();
}

async function del(name){
    await db.from("timers").delete().eq("name",name);
    delete players[name];
    render();
}

/* ===== GLOBAL ===== */

async function addAll(){
    let min=parseInt(document.getElementById("all").value,10);
    if(!min) return;

    for(let p of Object.values(players)){
        p.time=remaining(p)+min*60;
        p.running=true;
        p.last_update=new Date().toISOString();
        await save(p);
    }

    await load();
    render();
}

async function pauseAll(){
    for(let p of Object.values(players)){
        p.time=remaining(p);
        p.running=false;
        await save(p);
    }

    await load();
    render();
}

async function resumeAll(){
    for(let p of Object.values(players)){
        if(p.time<=0) continue;
        p.running=true;
        p.last_update=new Date().toISOString();
        await save(p);
    }

    await load();
    render();
}

async function clearAll(){
    await db.from("timers").delete().gt("time",-1);
    players={};
    render();
}

/* ===== INIT ===== */

async function init(){
    await load();
    render();
}

init();

setInterval(render,1000);

</script>

</body>
</html>
