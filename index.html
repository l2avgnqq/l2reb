<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EXP L2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
background:#0b1220;
color:#fff;
font-family:Arial;
}

.top{
text-align:center;
padding:20px;
}

.players{
max-width:1000px;
margin:auto;
padding:10px;
}

.player{
background:#162033;
margin:10px 0;
padding:14px;
border-radius:14px;
display:flex;
align-items:center;
gap:14px;
flex-wrap:wrap;
}

.name{
width:140px;
font-weight:bold;
color:#e5e7eb;
}

.time{
width:130px;
color:#22c55e;
font-size:20px;
font-weight:bold;
}

/* ===== INPUT ===== */

input{
padding:8px;
border-radius:10px;
border:none;
background:#0f172a;
color:#fff;
width:80px;
outline:none;
}

/* ===== BUTTONS ===== */

button{
padding:8px 14px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:bold;
transition:.15s;
}

button:hover{
transform:scale(1.05);
opacity:.9;
}

/* ===== COLORS ===== */

.add{background:#3b82f6;color:#fff}

.pause{background:#f59e0b;color:#111}
.resume{background:#22c55e;color:#111}
.del{background:#ef4444;color:#fff}

.global{
background:#334155;
color:#fff;
}

.sound{
background:#6366f1;
color:#fff;
}

/* ===== WARNING ===== */

.warn{background:#2a1f00}
.danger{background:#3a0a0a}
.flash{animation:blink .8s infinite}

@keyframes blink{
0%{opacity:1}
50%{opacity:.4}
100%{opacity:1}
}

/* ===== SPACING FIX ===== */

.actions{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
margin-left:auto;
}

</style>
</head>

<body>

<div class="top">

<h2>EXP Lineage2</h2>

<button class="sound" onclick="toggleSound()" id="soundBtn">🔊 Звук ВКЛ</button>

<br><br>

<input id="name" placeholder="Имя">
<input id="min" type="number" placeholder="Мин">
<button class="add" onclick="addPlayer()">Добавить</button>

<br><br>

<input id="all" type="number" placeholder="+ всем минут">
<button class="add" onclick="addAll()">+ всем</button>

<br><br>

<button class="global" onclick="pauseAll()">⏸ Пауза всем</button>
<button class="global" onclick="resumeAll()">▶ Старт всем</button>
<button class="global" onclick="clearAll()">🗑 Очистить</button>

</div>

<div id="list" class="players"></div>

<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<script>

const SUPABASE_URL="https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY="sb_publishable_-FajhSo3HLdy00i5VNemSA_89bLw5Qp";

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let players={};
let fired={};
let soundOn=true;

/* ===== SOUND ===== */

function toggleSound(){
soundOn=!soundOn;
document.getElementById("soundBtn").innerText =
soundOn ? "🔊 Звук ВКЛ" : "🔇 Звук ВЫКЛ";
}

function playSound(){
if(!soundOn) return;
const a=document.getElementById("alarm");
a.currentTime=0;
a.play().catch(()=>alert("ВРЕМЯ ВЫШЛО!"));
}

/* ===== TIME ===== */

function fmt(s){
s=Math.max(0,s);
let h=Math.floor(s/3600);
let m=Math.floor((s%3600)/60);
let sec=s%60;
return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}

function remaining(p){
if(!p.running) return p.time;
let diff=Math.floor((Date.now()-new Date(p.last_update))/1000);
return Math.max(0,p.time-diff);
}

/* ===== DB ===== */

async function load(){
let {data}=await db.from("timers").select("*");
players={};
(data||[]).forEach(p=>players[p.name]=p);
}

async function save(p){
await db.from("timers").upsert(p);
}

/* ===== RENDER ONCE ===== */

function createRow(p){

let div=document.createElement("div");
div.className="player";
div.id="row_"+p.name;

div.innerHTML=`
<div class="name">${p.name}</div>
<div class="time" id="t_${p.name}">0</div>

<div class="actions">

${
p.running
? `<button class="pause" onclick="pause('${p.name}')">⏸</button>`
: `<button class="resume" onclick="resume('${p.name}')">▶</button>`
}

<input id="i_${p.name}" type="number" placeholder="+мин">
<button class="add" onclick="addTime('${p.name}')">+</button>
<button class="del" onclick="del('${p.name}')">🗑</button>

</div>
`;

document.getElementById("list").appendChild(div);
}

function renderAll(){

const list=document.getElementById("list");
list.innerHTML="";

Object.values(players)
.sort((a,b)=>remaining(a)-remaining(b))
.forEach(p=>createRow(p));
}

/* ===== LIVE UPDATE TIME ONLY ===== */

function tick(){

Object.values(players).forEach(p=>{

let t=remaining(p);

let el=document.getElementById("t_"+p.name);
if(el) el.innerText=fmt(t);

let row=document.getElementById("row_"+p.name);
if(!row) return;

/* COLORS */

row.classList.remove("warn","danger","flash");

if(t<=300) row.classList.add("warn");
if(t<=60) row.classList.add("danger");
if(t<=30) row.classList.add("flash");

/* END */

if(t<=0 && p.running){
p.running=false;
p.time=0;
save(p);

if(!fired[p.name]){
fired[p.name]=true;
playSound();
}
}

});
}

/* ===== ACTIONS ===== */

async function addPlayer(){

let name=document.getElementById("name").value.trim();
let min=parseInt(document.getElementById("min").value,10);
if(!name||!min) return;

let p=players[name]||{name,time:0,running:false,last_update:null};

p.time=remaining(p)+min*60;
p.running=true;
p.last_update=new Date().toISOString();

fired[name]=false;

await save(p);
await load();
renderAll();
}

async function addTime(name){

let v=parseInt(document.getElementById("i_"+name).value,10);
if(!v) return;

let p=players[name];

p.time=remaining(p)+v*60;
p.running=true;
p.last_update=new Date().toISOString();

fired[name]=false;

await save(p);
await load();
renderAll();
}

async function pause(name){
let p=players[name];
p.time=remaining(p);
p.running=false;
await save(p);
await load();
renderAll();
}

async function resume(name){
let p=players[name];
if(p.time<=0) return;
p.running=true;
p.last_update=new Date().toISOString();
await save(p);
await load();
renderAll();
}

async function del(name){
await db.from("timers").delete().eq("name",name);
delete players[name];
renderAll();
}

/* ===== GLOBAL ===== */

async function addAll(){
let min=parseInt(document.getElementById("all").value,10);
if(!min) return;

for(let p of Object.values(players)){
p.time=remaining(p)+min*60;
p.running=true;
p.last_update=new Date().toISOString();
await save(p);
}

await load();
renderAll();
}

async function pauseAll(){
for(let p of Object.values(players)){
p.time=remaining(p);
p.running=false;
await save(p);
}

await load();
renderAll();
}

async function resumeAll(){
for(let p of Object.values(players)){
if(p.time<=0) continue;
p.running=true;
p.last_update=new Date().toISOString();
await save(p);
}

await load();
renderAll();
}

async function clearAll(){
await db.from("timers").delete().gt("time",-1);
players={};
renderAll();
}

/* ===== INIT ===== */

async function init(){
await load();
renderAll();
setInterval(tick,1000);
}

init();

</script>

</body>
</html>
