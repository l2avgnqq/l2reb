<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EXP Lineage2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    background:#111827;
    color:#fff;
    font-family:Arial,sans-serif;
}

.top{
    text-align:center;
    padding:20px;
}

.players{
    max-width:1200px;
    margin:auto;
    padding:15px;
}

.player{
    background:#1f2937;
    border-radius:14px;
    padding:14px;
    margin-bottom:10px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.warning{
    background:#5c3b00;
}

.danger{
    background:#5c0000;
}

.playerIndex{
    width:30px;
    color:#aaa;
}

.playerName{
    width:180px;
    font-weight:bold;
}

.playerTime{
    width:120px;
    color:#00ff95;
    font-size:24px;
    font-weight:bold;
}

input,button{
    border:none;
    border-radius:10px;
    padding:10px 14px;
    margin:4px;
    font-size:14px;
}

input{
    background:#374151;
    color:#fff;
}

button{
    cursor:pointer;
    font-weight:bold;
    transition:.15s;
}

button:hover{
    transform:scale(1.03);
    opacity:.92;
}

.smallInput{
    width:70px;
}

.pauseBtn{
    background:#f39c12;
    color:#fff;
}

.resumeBtn{
    background:#2ecc71;
    color:#fff;
}

.addBtn{
    background:#3498db;
    color:#fff;
}

.deleteBtn{
    background:#e74c3c;
    color:#fff;
}

.global{
    background:#6b7280;
    color:#fff;
}

@media(max-width:768px){
    .player{
        flex-direction:column;
        align-items:flex-start;
    }

    .playerName,
    .playerTime{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="top">

<h1>EXP Lineage2</h1>

<input id="name" placeholder="Имя">

<input id="minutes" type="number" placeholder="Минуты">

<button class="addBtn" onclick="addPlayer()">
Добавить
</button>

<br>

<input id="allMinutes" type="number" placeholder="+ всем минут">

<button class="addBtn" onclick="addAll()">
Добавить всем
</button>

<br><br>

<button class="global" onclick="pauseAll()">
Пауза всем
</button>

<button class="global" onclick="resumeAll()">
Старт всем
</button>

<button class="global" onclick="clearAll()">
Очистить
</button>

</div>

<div id="players" class="players"></div>

<audio id="alarm" preload="auto">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

const SUPABASE_URL="https://mxwtlfkhykqegzytotlq.supabase.co";

const SUPABASE_KEY="sb_publishable_-FajhSo3HLdy00i5VNemSA_89bLw5Qp";

const db=supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

let players={};

let notified={};

function formatTime(sec){

    sec=Math.max(0,sec);

    const h=Math.floor(sec/3600);

    const m=Math.floor((sec%3600)/60);

    const s=sec%60;

    return[
        h,
        String(m).padStart(2,"0"),
        String(s).padStart(2,"0")
    ].join(":");

}

function getRemaining(p){

    if(!p.running){

        return p.duration;

    }

    const passed=Math.floor(

        (Date.now()-
        new Date(p.started_at))/1000

    );

    return Math.max(
        0,
        p.duration-passed
    );

}

async function loadPlayers(){

    const {data,error}=await db
    .from("timers")
    .select("*");

    if(error){

        console.log(error);

        return;

    }

    players={};

    (data||[]).forEach(p=>{

        players[p.name]=p;

    });

}

async function savePlayer(p){

    const {error}=await db
    .from("timers")
    .upsert(p);

    if(error){

        console.log(error);

    }

}

function playAlarm(name){

    try{

        const audio=
        document.getElementById("alarm");

        audio.currentTime=0;

        audio.play();

    }catch(e){}

    document.title=
    "⏰ EXP закончилось: "+name;

    if("Notification" in window){

        if(Notification.permission==="granted"){

            new Notification(
                "EXP закончилось",
                {
                    body:name
                }
            );

        }

    }

}

function render(){

    const container=
    document.getElementById("players");

    container.innerHTML="";

    const arr=Object.values(players)

    .sort((a,b)=>

        getRemaining(a)-
        getRemaining(b)

    );

    arr.forEach((p,index)=>{

        const remain=
        getRemaining(p);

        if(remain<=0 && p.running){

            p.running=false;

            p.duration=0;

            savePlayer(p);

            if(!notified[p.name]){

                notified[p.name]=true;

                playAlarm(p.name);

            }

        }

        const div=
        document.createElement("div");

        div.className="player";

        if(remain<=300 && remain>60){

            div.classList.add("warning");

        }

        if(remain<=60){

            div.classList.add("danger");

        }

        const safeName=
        encodeURIComponent(p.name);

        div.innerHTML=`

        <div class="playerIndex">
            ${index+1}
        </div>

        <div class="playerName">
            ${p.name}
        </div>

        <div class="playerTime">
            ${formatTime(remain)}
        </div>

        ${
            p.running

            ?

            `
            <button
                class="pauseBtn"
                onclick="pausePlayer('${safeName}')"
            >
                Пауза
            </button>
            `

            :

            `
            <button
                class="resumeBtn"
                onclick="resumePlayer('${safeName}')"
            >
                Старт
            </button>
            `
        }

        <input
            type="number"
            id="add_${safeName}"
            class="smallInput"
            placeholder="мин"
        >

        <button
            class="addBtn"
            onclick="addTime('${safeName}')"
        >
            Добавить
        </button>

        <button
            class="deleteBtn"
            onclick="deletePlayer('${safeName}')"
        >
            Удалить
        </button>

        `;

        container.appendChild(div);

    });

}

async function addPlayer(){

    const name=
    document
    .getElementById("name")
    .value
    .trim();

    const min=parseInt(

        document
        .getElementById("minutes")
        .value,

        10

    );

    if(!name || !min){

        alert("Введите имя и минуты");

        return;

    }

    let p=players[name];

    if(!p){

        p={

            name,

            duration:0,

            started_at:null,

            running:false

        };

    }

    const remain=
    getRemaining(p);

    p.duration=
    remain+min*60;

    p.running=true;

    p.started_at=
    new Date().toISOString();

    notified[name]=false;

    await savePlayer(p);

}

async function addTime(name){

    name=decodeURIComponent(name);

    const val=parseInt(

        document
        .getElementById(
            "add_"+encodeURIComponent(name)
        )
        .value,

        10

    );

    if(!val){

        return;

    }

    const p=players[name];

    const remain=
    getRemaining(p);

    p.duration=
    remain+val*60;

    p.running=true;

    p.started_at=
    new Date().toISOString();

    notified[name]=false;

    await savePlayer(p);

}

async function pausePlayer(name){

    name=decodeURIComponent(name);

    const p=players[name];

    p.duration=
    getRemaining(p);

    p.running=false;

    await savePlayer(p);

}

async function resumePlayer(name){

    name=decodeURIComponent(name);

    const p=players[name];

    if(p.duration<=0){

        return;

    }

    p.running=true;

    p.started_at=
    new Date().toISOString();

    await savePlayer(p);

}

async function deletePlayer(name){

    name=decodeURIComponent(name);

    await db
    .from("timers")
    .delete()
    .eq("name",name);

}

async function addAll(){

    const min=parseInt(

        document
        .getElementById("allMinutes")
        .value,

        10

    );

    if(!min){

        return;

    }

    await Promise.all(

        Object.values(players)
        .map(async p=>{

            const remain=
            getRemaining(p);

            p.duration=
            remain+min*60;

            p.running=true;

            p.started_at=
            new Date().toISOString();

            return savePlayer(p);

        })

    );

}

async function pauseAll(){

    await Promise.all(

        Object.values(players)
        .map(async p=>{

            p.duration=
            getRemaining(p);

            p.running=false;

            return savePlayer(p);

        })

    );

}

async function resumeAll(){

    await Promise.all(

        Object.values(players)
        .map(async p=>{

            if(p.duration<=0){

                return;

            }

            p.running=true;

            p.started_at=
            new Date().toISOString();

            return savePlayer(p);

        })

    );

}

async function clearAll(){

    await db
    .from("timers")
    .delete()
    .gt("duration",-1);

}

async function init(){

    if("Notification" in window){

        Notification.requestPermission();

    }

    await loadPlayers();

    render();

}

init();

db.channel("timers")

.on(
    "postgres_changes",
    {
        event:"*",
        schema:"public",
        table:"timers"
    },

    async ()=>{

        await loadPlayers();

        render();

    }
)

.subscribe();

setInterval(render,1000);

</script>

</body>
</html>
