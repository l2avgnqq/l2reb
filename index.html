<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EXP L2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    background:#0b1220;
    color:#fff;
    font-family:Arial;
    padding:20px;
}

.top{
    text-align:center;
    margin-bottom:20px;
}

.players{
    max-width:900px;
    margin:auto;
}

.player{
    background:#162033;
    margin:8px 0;
    padding:12px;
    border-radius:12px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.warn{background:#3a2c00}
.danger{background:#4a1010}

.idx{
    width:30px;
    color:#94a3b8;
    font-weight:bold;
}

.name{
    width:140px;
    font-weight:bold;
}

.time{
    width:120px;
    font-size:22px;
    font-weight:bold;
    color:#22c55e;
}

.actions{
    margin-left:auto;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

input{
    padding:8px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
    width:80px;
}

button{
    border:none;
    border-radius:10px;
    padding:8px 12px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.add{background:#2563eb}
.pause{background:#f59e0b}
.resume{background:#22c55e}
.del{background:#ef4444}
.global{background:#334155}
</style>
</head>

<body>

<div class="top">

<h2>EXP L2</h2>

<input id="name" placeholder="Имя">
<input id="min" type="number" placeholder="Мин">

<button class="add" onclick="addPlayer()">
Добавить
</button>

<br><br>

<input id="all" type="number" placeholder="+ всем">

<button class="add" onclick="addAll()">
+ всем
</button>

<br><br>

<button class="global" onclick="pauseAll()">
⏸ Пауза всем
</button>

<button class="global" onclick="resumeAll()">
▶ Старт всем
</button>

<button class="global" onclick="clearAll()">
🗑 Очистить
</button>

</div>

<div id="list" class="players"></div>

<script>

/* ================= CONFIG ================= */

const db = supabase.createClient(
    "https://mxwtlfkhykqegzytotlq.supabase.co",
    "sb_publishable_-FajhSo3HLdy00i5VNemSA_89bLw5Qp"
);

let players = {};

/* ================= HELPERS ================= */

const id = s => s.replace(/[^a-z0-9]/gi,"_");

const fmt = s => {
    s=Math.max(0,s);
    let h=Math.floor(s/3600);
    let m=Math.floor((s%3600)/60);
    let sec=s%60;
    return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
};

const left = p => {

    if(!p.running || !p.last_update)
        return p.time;

    return Math.max(
        0,
        p.time - Math.floor(
            (Date.now()-new Date(p.last_update))/1000
        )
    );
};

/* ================= DB ================= */

async function load(){

    let {data} = await db
        .from("timers")
        .select("*");

    players = {};

    (data||[]).forEach(
        p => players[p.name]=p
    );
}

const save = p =>
    db.from("timers").upsert(p);

/* ================= UI ================= */

function row(p){

    let pid=id(p.name);

    return `
    <div class="player" id="r_${pid}">

        <div class="idx"></div>

        <div class="name">
            ${p.name}
        </div>

        <div class="time" id="t_${pid}">
            0
        </div>

        <div class="actions">

            <button id="b_${pid}"></button>

            <input
                id="i_${pid}"
                type="number"
                placeholder="+мин"
            >

            <button
                class="add"
                onclick="addTime('${p.name}')"
            >
                +
            </button>

            <button
                class="del"
                onclick="removePlayer('${p.name}')"
            >
                🗑
            </button>

        </div>

    </div>
    `;
}

function render(){

    let arr = Object.values(players)

    .map(p=>({
        ...p,
        remain:left(p)
    }))

    .sort((a,b)=>a.remain-b.remain);

    let list=document.getElementById("list");

    list.innerHTML="";

    arr.forEach((p,i)=>{

        list.innerHTML+=row(p);

        let pid=id(p.name);

        let r=document.getElementById("r_"+pid);

        r.querySelector(".idx").innerText=i+1;

        document.getElementById("t_"+pid)
            .innerText=fmt(p.remain);

        if(p.remain<=300)
            r.classList.add("warn");

        if(p.remain<=60)
            r.classList.add("danger");

        let btn=document.getElementById("b_"+pid);

        if(p.running){

            btn.innerText="⏸";
            btn.className="pause";
            btn.onclick=()=>pausePlayer(p.name);

        }else{

            btn.innerText="▶";
            btn.className="resume";
            btn.onclick=()=>resumePlayer(p.name);
        }

    });
}

/* ================= ACTIONS ================= */

async function addPlayer(){

    let name=nameInput.value.trim();
    let min=parseInt(minInput.value);

    if(!name || min<=0) return;

    let p=players[name] || {
        name,
        time:0,
        running:false
    };

    p.time=left(p)+min*60;
    p.running=true;
    p.last_update=new Date().toISOString();

    await save(p);

    nameInput.value="";
    minInput.value="";

    await load();
    render();
}

async function addTime(name){

    let v=parseInt(
        document.getElementById("i_"+id(name)).value
    );

    if(v<=0) return;

    let p=players[name];

    p.time=left(p)+v*60;
    p.running=true;
    p.last_update=new Date().toISOString();

    await save(p);

    await load();
    render();
}

async function pausePlayer(name){

    let p=players[name];

    p.time=left(p);
    p.running=false;
    p.last_update=null;

    await save(p);

    await load();
    render();
}

async function resumePlayer(name){

    let p=players[name];

    if(left(p)<=0) return;

    p.running=true;
    p.last_update=new Date().toISOString();

    await save(p);

    await load();
    render();
}

async function removePlayer(name){

    await db
        .from("timers")
        .delete()
        .eq("name",name);

    delete players[name];

    render();
}

async function addAll(){

    let v=parseInt(all.value);

    if(v<=0) return;

    for(let p of Object.values(players)){

        p.time=left(p)+v*60;
        p.running=true;
        p.last_update=new Date().toISOString();

        await save(p);
    }

    await load();
    render();
}

async function pauseAll(){

    for(let p of Object.values(players)){

        p.time=left(p);
        p.running=false;
        p.last_update=null;

        await save(p);
    }

    await load();
    render();
}

async function resumeAll(){

    for(let p of Object.values(players)){

        if(left(p)<=0) continue;

        p.running=true;
        p.last_update=new Date().toISOString();

        await save(p);
    }

    await load();
    render();
}

async function clearAll(){

    await db
        .from("timers")
        .delete()
        .neq("name","___");

    players={};

    render();
}

/* ================= REALTIME ================= */

db.channel("timers")

.on(
    "postgres_changes",
    {
        event:"*",
        schema:"public",
        table:"timers"
    },
    async ()=>{
        await load();
        render();
    }
)

.subscribe();

/* ================= INIT ================= */

const nameInput=document.getElementById("name");
const minInput=document.getElementById("min");

async function init(){

    await load();

    render();

    setInterval(render,1000);
}

init();

</script>

</body>
</html>
