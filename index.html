<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>EXP Timer Supabase</title>
<style>
button { margin:5px; padding:5px; cursor:pointer; }
.expired { background: red; color: white; }
</style>
</head>
<body>

<div id="players"></div>

<input id="newName" placeholder="Ім'я">
<input id="newMinutes" type="number" placeholder="Хвилини">
<button onclick="addNewPlayer()">Додати гравця</button>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = 'ВАШ_PROJECT_URL';
const SUPABASE_ANON_KEY = 'sb_publishable_GTPV803deiaeT6Tikf3HHg_IknudqlS';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let timerData = {};

// Timer helpers
function getCurrentTime(p){ return p.running ? Math.max(0, p.time - Math.floor((Date.now()-p.start)/1000)) : p.time; }
function formatTime(sec){ let m=Math.floor(sec/60); let s=sec%60; return m+":"+(s<10?"0":"")+s; }

// Create player UI
function createPlayer(name,p){
    if(document.getElementById(name)) return;
    const div = document.createElement("div");
    div.id = name;
    div.innerHTML = `
        <b>${name}</b> - <span class="time">${formatTime(getCurrentTime(p))}</span>
        <button class="pause">⏸</button>
        <button class="resume">▶</button>
        <input type="number" placeholder="+ хв"><button class="add">Додати</button>
    `;
    document.getElementById("players").appendChild(div);

    div.querySelector(".pause").onclick = ()=>{ p.running=false; p.time=getCurrentTime(p); saveTimerSupabase(); };
    div.querySelector(".resume").onclick = ()=>{ p.running=true; p.start=Date.now(); saveTimerSupabase(); };
    div.querySelector(".add").onclick = ()=>{
        const val = parseInt(div.querySelector("input").value);
        if(val) { p.time = getCurrentTime(p)+val*60; p.start=Date.now(); div.querySelector("input").value=""; saveTimerSupabase(); }
    };
}

// Load timers from Supabase
async function loadTimerSupabase(){
    const { data } = await supabase.from('timers').select('*');
    data.forEach(p=>{
        timerData[p.name] = {time:p.time, running:p.running, start:p.start};
        createPlayer(p.name, timerData[p.name]);
    });
}

// Save timers to Supabase
async function saveTimerSupabase(){
    for(let name in timerData){
        const p=timerData[name];
        await supabase.from('timers').upsert({name:name,time:getCurrentTime(p),running:p.running,start:p.start},{onConflict:['name']});
    }
}

// Add new player
function addNewPlayer(){
    const name = document.getElementById("newName").value.trim();
    const mins = parseInt(document.getElementById("newMinutes").value);
    if(!name || !mins) return;
    timerData[name] = {time:mins*60,running:true,start:Date.now()};
    createPlayer(name,timerData[name]);
    saveTimerSupabase();
}

setInterval(()=>{
    for(let name in timerData){
        const p=timerData[name];
        document.querySelector("#"+name+" .time").innerText=formatTime(getCurrentTime(p));
    }
},1000);

loadTimerSupabase();
</script>

</body>
</html>
