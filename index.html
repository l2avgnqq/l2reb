<script>

const SUPABASE_URL = "https://mxwtlfkhykqegzytotlq.supabase.co";
const SUPABASE_KEY = "ТВОЙ_ANON_KEY";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let data = {};

/* ---------- LOAD ---------- */
async function load(){
    let { data: rows, error } = await db
        .from("timers")
        .select("*");

    console.log("LOAD:", rows, error);

    let obj = {};

    (rows || []).forEach(p => {
        obj[p.name] = {
            name: p.name,
            time: Number(p.time) || 0,
            running: !!p.running,
            last_update: p.last_update
        };
    });

    data = obj;
}

/* ---------- SAVE ---------- */
async function save(p){
    await db
        .from("timers")
        .upsert([p], {
            onConflict: "name"
        });
}

/* ---------- TIME ---------- */
function updateTime(p){
    if(!p.running) return;

    let last = new Date(p.last_update);
    let diff = Math.floor((Date.now() - last) / 1000);

    if(diff <= 0) return;

    let worked = Math.min(diff, p.time);

    p.time -= worked;
    p.last_update = new Date().toISOString();

    if(p.time <= 0){
        p.time = 0;
        p.running = false;
    }
}

/* ---------- FORMAT ---------- */
function format(s){
    let m = Math.floor(s / 60);
    let sec = s % 60;
    return m + ":" + sec.toString().padStart(2,"0");
}

/* ---------- RENDER ---------- */
function render(){
    const container = document.getElementById("players");
    container.innerHTML = "";

    Object.values(data).forEach(updateTime);

    let arr = Object.values(data).sort((a,b)=> a.time - b.time);

    arr.forEach((p, index) => {

        const div = document.createElement("div");
        div.className = "player";

        div.innerHTML = `
            <span style="width:30px;">${index+1}.</span>
            <span style="width:120px;"><b>${p.name}</b></span>
            <span style="width:80px;">${format(p.time)}</span>

            <button onclick="pause('${p.name}')">⏸</button>
            <button onclick="resume('${p.name}')">▶</button>

            <input type="number" id="add_${p.name}" style="width:60px;">
            <button onclick="addTime('${p.name}')">+</button>

            <button onclick="delPlayer('${p.name}')">❌</button>
        `;

        container.appendChild(div);
    });
}

/* ---------- ACTIONS ---------- */

async function add(){
    let name = document.getElementById("name").value.trim();
    let min = parseInt(document.getElementById("minutes").value);

    if(!name || !min) return;

    let p = data[name] || {
        name,
        time: 0,
        running: false,
        last_update: new Date().toISOString()
    };

    updateTime(p);

    p.time += min * 60;
    p.running = true;
    p.last_update = new Date().toISOString();

    data[name] = p;

    await save(p);
    await load();
    render();
}

async function addTime(name){
    let val = parseInt(document.getElementById("add_"+name).value);
    if(!val) return;

    let p = data[name];

    updateTime(p);

    p.time += val * 60;
    p.running = true;
    p.last_update = new Date().toISOString();

    await save(p);
    await load();
    render();
}

async function pause(name){
    let p = data[name];
    updateTime(p);

    p.running = false;
    await save(p);

    render();
}

async function resume(name){
    let p = data[name];

    p.running = true;
    p.last_update = new Date().toISOString();

    await save(p);
    render();
}

async function delPlayer(name){
    await db.from("timers").delete().eq("name", name);
    delete data[name];
    render();
}

/* ---------- GLOBAL ---------- */

async function addAll(){
    let min = parseInt(document.getElementById("allMinutes").value);
    if(!min) return;

    for(let name in data){
        let p = data[name];

        updateTime(p);

        p.time += min * 60;
        p.running = true;
        p.last_update = new Date().toISOString();

        await save(p);
    }

    await load();
    render();
}

async function pauseAll(){
    for(let name in data){
        let p = data[name];
        updateTime(p);

        p.running = false;
        await save(p);
    }

    render();
}

async function resumeAll(){
    for(let name in data){
        let p = data[name];

        p.running = true;
        p.last_update = new Date().toISOString();

        await save(p);
    }

    render();
}

async function clearAll(){
    await db.from("timers").delete().neq("name","");
    data = {};
    render();
}

/* ---------- INIT ---------- */

document.getElementById("addBtn").onclick = add;
document.getElementById("addAllBtn").onclick = addAll;
document.getElementById("pauseAll").onclick = pauseAll;
document.getElementById("resumeAll").onclick = resumeAll;
document.getElementById("clearAll").onclick = clearAll;

async function init(){
    await load();
    render();
}

init();
setInterval(render, 1000);

</script>
